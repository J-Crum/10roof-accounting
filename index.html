<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>10Roof Accounting</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600;700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --bg: #0f1117; --surface: #181b24; --card: #1c1f2b; --card-alt: #212536;
  --border: #2a2e3d; --border-light: #353a4d; --text: #e8eaf0; --text-muted: #8b90a5; --text-dim: #5c6178;
  --accent: #3ecfb4; --accent-dim: #2a9e87; --accent-glow: rgba(62,207,180,0.12);
  --gold: #d4a853; --red: #e85c5c; --red-dim: rgba(232,92,92,0.12);
  --green: #4ecb8d; --green-dim: rgba(78,203,141,0.12);
  --blue: #5b9cf5; --blue-dim: rgba(91,156,245,0.12);
}
body { background: var(--bg); color: var(--text); font-family: 'DM Sans', sans-serif; min-height: 100vh; line-height: 1.5; }
::-webkit-scrollbar { width: 6px; height: 6px; }
::-webkit-scrollbar-track { background: var(--bg); }
::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

.setup-screen { display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; gap: 20px; padding: 20px; }
.setup-title { font-size: 24px; font-weight: 700; }
.setup-sub { color: var(--text-muted); font-size: 14px; max-width: 480px; text-align: center; line-height: 1.6; }
.setup-box { width: min(540px, 92vw); background: var(--card); border: 1px solid var(--border); border-radius: 12px; padding: 24px; }
.setup-box h3 { font-size: 14px; font-weight: 600; margin-bottom: 16px; color: var(--accent); }
.setup-box label { display: block; font-size: 11px; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 4px; margin-top: 14px; }
.setup-box label:first-of-type { margin-top: 0; }
.setup-box input, .setup-box textarea { width: 100%; padding: 10px 12px; background: var(--bg); border: 1px solid var(--border); border-radius: 6px; color: var(--text); font-size: 12px; font-family: 'Space Mono', monospace; outline: none; }
.setup-box input:focus, .setup-box textarea:focus { border-color: var(--accent); }
.setup-note { margin-top: 14px; font-size: 12px; color: var(--text-dim); line-height: 1.6; }
.sn { display: inline-flex; align-items: center; justify-content: center; width: 22px; height: 22px; border-radius: 50%; background: var(--accent); color: var(--bg); font-size: 11px; font-weight: 700; margin-right: 6px; flex-shrink: 0; }
.ss { display: flex; align-items: flex-start; gap: 0; margin-bottom: 12px; font-size: 13px; color: var(--text); line-height: 1.6; }
.setup-btn { display: block; width: 100%; padding: 12px; margin-top: 20px; background: var(--accent); color: var(--bg); border: none; border-radius: 8px; font-size: 14px; font-weight: 600; font-family: 'DM Sans', sans-serif; cursor: pointer; }
.setup-btn:hover { filter: brightness(1.1); }
.setup-status { margin-top: 12px; padding: 10px 14px; border-radius: 8px; font-size: 13px; display: none; }
.setup-status.success { display: block; background: var(--green-dim); color: var(--green); border: 1px solid var(--green); }
.setup-status.error { display: block; background: var(--red-dim); color: var(--red); border: 1px solid var(--red); }

.header { border-bottom: 1px solid var(--border); padding: 14px 28px; display: flex; align-items: center; justify-content: space-between; flex-wrap: wrap; gap: 12px; }
.header-left { display: flex; align-items: center; gap: 12px; }
.logo-img { width: 38px; height: 38px; border-radius: 8px; }
.header-title { font-weight: 700; font-size: 16px; }
.header-sub { font-size: 11px; color: var(--text-dim); }
.header-controls { display: flex; gap: 8px; align-items: center; flex-wrap: wrap; }
.header-select, .header-input { padding: 6px 10px; background: var(--bg); border: 1px solid var(--border); border-radius: 6px; color: var(--text); font-size: 12px; font-family: 'DM Sans', sans-serif; }
.header-input { width: 80px; }

.tabs { padding: 10px 28px; display: flex; gap: 4px; border-bottom: 1px solid var(--border); overflow-x: auto; }
.tab { padding: 8px 14px; background: transparent; border: 1px solid transparent; border-radius: 8px; color: var(--text-muted); cursor: pointer; font-size: 13px; font-weight: 400; font-family: 'DM Sans', sans-serif; display: flex; align-items: center; gap: 6px; transition: all 0.2s; white-space: nowrap; }
.tab:hover { color: var(--text); background: var(--surface); }
.tab.active { background: var(--accent-glow); border-color: var(--accent-dim); color: var(--accent); font-weight: 600; }

.content { padding: 24px 28px; max-width: 1200px; margin: 0 auto; }
.stats-grid { display: flex; flex-wrap: wrap; gap: 14px; margin-bottom: 24px; }
.stat-card { background: var(--card); border: 1px solid var(--border); border-radius: 12px; padding: 18px 20px; flex: 1 1 180px; min-width: 160px; }
.stat-label { font-size: 10px; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.8px; margin-bottom: 6px; }
.stat-value { font-size: 22px; font-weight: 700; font-family: 'Space Mono', monospace; }
.stat-sub { font-size: 11px; color: var(--text-dim); margin-top: 3px; }
.stat-icon { font-size: 20px; opacity: 0.5; }

.panel { background: var(--card); border: 1px solid var(--border); border-radius: 12px; padding: 22px; }
.panel-title { font-size: 12px; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.8px; margin-bottom: 16px; }
.two-col { display: flex; gap: 20px; flex-wrap: wrap; }
.two-col > * { flex: 1 1 320px; }

.mini-bar { margin-bottom: 8px; }
.mini-bar-header { display: flex; justify-content: space-between; margin-bottom: 3px; }
.mini-bar-label { font-size: 12px; color: var(--text-muted); }
.mini-bar-val { font-size: 12px; color: var(--text); font-weight: 600; }
.mini-bar-track { height: 6px; background: var(--border); border-radius: 3px; }
.mini-bar-fill { height: 6px; border-radius: 3px; transition: width 0.5s ease; }

.btn { padding: 8px 16px; border: none; border-radius: 6px; cursor: pointer; font-size: 13px; font-family: 'DM Sans', sans-serif; display: inline-flex; align-items: center; gap: 6px; transition: all 0.2s; }
.btn:hover { filter: brightness(1.1); }
.btn-primary { background: var(--accent); color: var(--bg); font-weight: 600; }
.btn-secondary { background: var(--card-alt); color: var(--text-muted); border: 1px solid var(--border); }
.btn-ghost { background: transparent; color: var(--text-muted); padding: 4px 8px; font-size: 12px; }
.btn-ghost:hover { color: var(--text); }
.btn-ghost.red { color: var(--red); }
.btn-row { display: flex; gap: 8px; flex-wrap: wrap; }

.section-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; flex-wrap: wrap; gap: 10px; }
.section-title { font-size: 18px; font-weight: 600; }

.form-panel { background: var(--card); border: 1px solid var(--border-light); border-radius: 12px; padding: 24px; margin-bottom: 20px; }
.form-title { font-size: 14px; font-weight: 600; margin-bottom: 16px; }
.form-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap: 14px; }
.field { display: flex; flex-direction: column; gap: 4px; }
.field-label { font-size: 11px; color: var(--text-muted); font-weight: 500; text-transform: uppercase; letter-spacing: 0.5px; }
.field-input, .field-select { width: 100%; padding: 8px 12px; background: var(--bg); border: 1px solid var(--border); border-radius: 6px; color: var(--text); font-size: 13px; font-family: 'DM Sans', sans-serif; outline: none; }
.field-input:focus, .field-select:focus { border-color: var(--accent); }
.field-select { cursor: pointer; }
.checkbox-field { display: flex; align-items: center; gap: 8px; cursor: pointer; font-size: 13px; color: var(--text-muted); }
.checkbox-box { width: 18px; height: 18px; border-radius: 4px; border: 1px solid var(--border); display: flex; align-items: center; justify-content: center; cursor: pointer; font-size: 12px; font-weight: 700; color: var(--accent); }
.checkbox-box.checked { border-color: var(--accent); background: var(--accent-glow); }

.table-wrap { overflow-x: auto; }
table { width: 100%; border-collapse: collapse; }
th { padding: 10px 12px; text-align: left; font-size: 11px; color: var(--text-dim); text-transform: uppercase; letter-spacing: 0.5px; font-weight: 500; border-bottom: 1px solid var(--border); }
td { padding: 10px 12px; font-size: 13px; border-bottom: 1px solid var(--border); }
.mono { font-family: 'Space Mono', monospace; }
.accent-text { color: var(--accent); font-weight: 600; }
.red-text { color: var(--red); }
.badge { font-size: 11px; padding: 3px 10px; border-radius: 12px; font-weight: 500; display: inline-block; }
.badge-paid { background: var(--green-dim); color: var(--green); }
.badge-invoiced { background: var(--blue-dim); color: var(--blue); }
.badge-pending { background: var(--blue-dim); color: var(--blue); }
.badge-overdue { background: var(--red-dim); color: var(--red); }

.client-card { margin-bottom: 16px; }
.client-header { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 14px; flex-wrap: wrap; gap: 10px; }
.client-name { font-size: 16px; font-weight: 600; margin-bottom: 4px; }
.client-meta { font-size: 12px; color: var(--text-muted); }
.client-total { font-size: 24px; font-weight: 700; font-family: 'Space Mono', monospace; color: var(--accent); }

.tax-divider { margin-top: 16px; padding-top: 14px; border-top: 1px solid var(--border); display: flex; justify-content: space-between; }
.tax-row { display: flex; justify-content: space-between; margin-top: 8px; }
.tax-label { font-size: 13px; font-weight: 600; }
.disclaimer { background: var(--card-alt); border: 1px solid var(--border); border-radius: 12px; padding: 20px; font-size: 12px; color: var(--text-muted); line-height: 1.7; }
.disclaimer strong { color: var(--gold); }
.tax-payment-row { display: flex; justify-content: space-between; padding: 8px 0; border-bottom: 1px solid var(--border); font-size: 13px; align-items: center; }

.aging-row { padding: 12px 0; border-bottom: 1px solid var(--border); }
.aging-overdue { background: var(--red-dim); border-radius: 8px; padding: 12px; margin-bottom: 8px; }

.empty { padding: 40px; text-align: center; color: var(--text-dim); font-size: 13px; }
.loading-overlay { position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(15,17,23,0.85); display: flex; align-items: center; justify-content: center; z-index: 1000; color: var(--text-muted); font-size: 14px; }
.spinner { width: 24px; height: 24px; border: 2px solid var(--border); border-top-color: var(--accent); border-radius: 50%; animation: spin 0.8s linear infinite; margin-right: 12px; }
@keyframes spin { to { transform: rotate(360deg); } }
.notification { position: fixed; top: 20px; right: 20px; z-index: 999; padding: 12px 20px; border-radius: 8px; font-size: 13px; font-weight: 500; animation: fadeIn 0.3s ease; }
.notification.success { background: var(--green-dim); color: var(--green); border: 1px solid var(--green); }
.notification.error { background: var(--red-dim); color: var(--red); border: 1px solid var(--red); }
.notification.info { background: var(--blue-dim); color: var(--blue); border: 1px solid var(--blue); }
@keyframes fadeIn { from { opacity: 0; transform: translateY(-8px); } to { opacity: 1; transform: translateY(0); } }
select option { background: var(--surface); color: var(--text); }
input[type="date"]::-webkit-calendar-picker-indicator { filter: invert(0.7); }

/* Invoice print styles */
.invoice-container { background: #fff; color: #1a1d26; padding: 40px; border-radius: 12px; max-width: 800px; margin: 0 auto; }
.invoice-container h2 { color: #1a1d26; margin-bottom: 20px; }
.invoice-header { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 30px; border-bottom: 3px solid #3ecfb4; padding-bottom: 20px; }
.invoice-logo { width: 60px; height: 60px; }
.invoice-company { text-align: right; font-size: 13px; color: #555; line-height: 1.6; }
.invoice-company strong { color: #1a1d26; font-size: 18px; display: block; margin-bottom: 4px; }
.invoice-meta { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 30px; }
.invoice-meta-box { font-size: 13px; line-height: 1.8; }
.invoice-meta-box strong { display: block; font-size: 12px; text-transform: uppercase; color: #888; letter-spacing: 0.5px; margin-bottom: 4px; }
.invoice-table { width: 100%; border-collapse: collapse; margin-bottom: 30px; }
.invoice-table th { background: #f5f7fa; padding: 10px 14px; text-align: left; font-size: 11px; text-transform: uppercase; color: #666; border-bottom: 2px solid #e0e0e0; }
.invoice-table td { padding: 12px 14px; font-size: 14px; border-bottom: 1px solid #eee; }
.invoice-total { text-align: right; font-size: 20px; font-weight: 700; color: #1a1d26; margin-bottom: 30px; }
.invoice-terms { font-size: 12px; color: #888; line-height: 1.6; border-top: 1px solid #eee; padding-top: 20px; }

@media print {
  body { background: #fff !important; }
  .header, .tabs, .section-header, .notification, .btn-row { display: none !important; }
  .content { padding: 0; max-width: none; }
  .invoice-container { box-shadow: none; padding: 20px; }
}
@media (max-width: 640px) {
  .header, .tabs, .content { padding-left: 16px; padding-right: 16px; }
  .stat-card { min-width: 140px; } .stat-value { font-size: 18px; }
  .form-grid { grid-template-columns: 1fr; }
}
</style>
</head>

const EXPENSE_CATEGORIES = ['Client Meals & Entertainment (50%)','Cell Phone','Office Supplies','LinkedIn Recruiter/Premium','Software & Subscriptions','Job Board Postings','Travel (flights, hotels)','Vehicle/Mileage','Professional Development','Marketing & Advertising','Insurance (E&O, General)','Professional Services (Legal, CPA)','Home Office','Miscellaneous'];
const HALF_DEDUCTIBLE = ['Client Meals & Entertainment (50%)'];
const CLIENTS = ['Stream Data Centers','NICE','Hotwire Communications','Other'];
const INCOME_STATUS = ['Pending','Invoiced','Paid','Overdue'];
const TAX_RATE_FEDERAL=0.22, TAX_RATE_STATE_CO=0.044, TAX_RATE_SE=0.153;
const IRS_MILEAGE_RATE = 0.70;

const uid=()=>Date.now().toString(36)+Math.random().toString(36).slice(2,7);
const today=()=>new Date().toISOString().split('T')[0];
function $(n){return formatCurrency(n)}
function formatCurrency(n){const num=Number(n)||0;const f=Math.abs(num).toLocaleString('en-US',{minimumFractionDigits:2,maximumFractionDigits:2});return num<0?`-$${f}`:`$${f}`;}
function formatDate(d){if(!d)return '';return new Date(d+'T00:00:00').toLocaleDateString('en-US',{month:'short',day:'numeric',year:'numeric'});}
function badgeClass(s){return 'badge badge-'+(s||'pending').toLowerCase();}
function isDeductible(v){return v==='TRUE'||v==='true'||v===true;}
function daysBetween(d1,d2){return Math.floor((new Date(d2)-new Date(d1))/(1000*60*60*24));}

const state={configured:false,loading:false,tab:'dashboard',filterYear:new Date().getFullYear(),filterQuarter:0,income:[],expenses:[],taxPayments:[],mileage:[],editingIncome:null,editingExpense:null,editingMileage:null,notification:null,invoiceData:null};

// ─── API ─────────────────────────────────────────────────────
async function apiCall(action,data={}){
  const r=await fetch(CONFIG.WEBAPP_URL,{method:'POST',mode:'cors',redirect:'follow',body:JSON.stringify({action,...data})});
  const text=await r.text();
  let result;try{result=JSON.parse(text);}catch(e){throw new Error('Invalid response');}
  if(result.error)throw new Error(result.error);return result;
}
async function loadAllData(){
  state.loading=true;render();
  try{const r=await apiCall('getAll');state.income=r.income||[];state.expenses=r.expenses||[];state.taxPayments=r.taxPayments||[];state.mileage=r.mileage||[];notify('Data loaded','success');}
  catch(e){notify('Load error: '+e.message,'error');}
  state.loading=false;render();
}

// ─── CRUD helpers (no re-render on input changes) ────────────
async function saveRecord(sheet,formData,stateArray,editingKey){
  state.loading=true;render();
  try{
    const idx=stateArray.findIndex(r=>r.ID===formData.ID);
    if(idx>=0)await apiCall('updateRow',{sheet,rowIndex:idx,data:formData});
    else await apiCall('addRow',{sheet,data:formData});
    await loadAllData();state[editingKey]=null;notify('Saved');
  }catch(e){notify('Error: '+e.message,'error');}
  state.loading=false;render();
}
async function deleteRecord(sheet,id,stateArray){
  if(!confirm('Delete this record?'))return;
  state.loading=true;render();
  try{const i=stateArray.findIndex(r=>r.ID===id);if(i>=0)await apiCall('deleteRow',{sheet,rowIndex:i});await loadAllData();}
  catch(e){notify('Error: '+e.message,'error');}
}

// Specific save wrappers
function saveIncome(){
  const f=state.editingIncome;if(!f)return;
  const data={ID:f.ID||uid(),Date:f.Date,Client:f.Client,Candidate:f.Candidate,Salary:f.Salary,FeePercent:f.FeePercent,FeeAmount:f.FeeAmount,Description:f.Description,Status:f.Status,PaymentTerms:f.PaymentTerms||'',InvoiceDate:f.InvoiceDate||'',DueDate:f.DueDate||''};
  saveRecord('Income',data,state.income,'editingIncome');
}
function saveExpense(){
  const f=state.editingExpense;if(!f)return;
  const data={ID:f.ID||uid(),Date:f.Date,Category:f.Category,Vendor:f.Vendor,Amount:f.Amount,Description:f.Description,TaxDeductible:f.TaxDeductible};
  saveRecord('Expenses',data,state.expenses,'editingExpense');
}
function saveMileage(){
  const f=state.editingMileage;if(!f)return;
  const miles=Number(f.Miles)||0;
  const data={ID:f.ID||uid(),Date:f.Date,Description:f.Description,Miles:f.Miles,Rate:String(IRS_MILEAGE_RATE),Amount:(miles*IRS_MILEAGE_RATE).toFixed(2)};
  saveRecord('Mileage',data,state.mileage,'editingMileage');
}
async function addTaxPayment(){
  const amount=prompt('Payment amount:');if(!amount)return;
  const date=prompt('Date (YYYY-MM-DD):',today());if(!date)return;
  const type=prompt('Type (Federal/State/SE):','Federal');
  state.loading=true;render();
  try{await apiCall('addRow',{sheet:'TaxPayments',data:{ID:uid(),Date:date,Type:type||'Federal',Amount:amount,Notes:''}});await loadAllData();}catch(e){notify('Error: '+e.message,'error');}
}

function exportCSV(rows,headers,filename){
  const h=headers.join(',')+'\n';
  const body=rows.map(r=>headers.map(k=>`"${r[k]||''}"`).join(',')).join('\n');
  const blob=new Blob([h+body],{type:'text/csv'});const url=URL.createObjectURL(blob);
  const a=document.createElement('a');a.href=url;a.download=filename;a.click();URL.revokeObjectURL(url);
}

// ─── FILTERING ───────────────────────────────────────────────
function gfi(){return state.income.filter(r=>{const d=new Date(r.Date+'T00:00:00');if(d.getFullYear()!==state.filterYear)return false;if(state.filterQuarter>0&&Math.ceil((d.getMonth()+1)/3)!==state.filterQuarter)return false;return true;});}
function gfe(){return state.expenses.filter(r=>{const d=new Date(r.Date+'T00:00:00');if(d.getFullYear()!==state.filterYear)return false;if(state.filterQuarter>0&&Math.ceil((d.getMonth()+1)/3)!==state.filterQuarter)return false;return true;});}
function gfm(){return state.mileage.filter(r=>{const d=new Date(r.Date+'T00:00:00');if(d.getFullYear()!==state.filterYear)return false;if(state.filterQuarter>0&&Math.ceil((d.getMonth()+1)/3)!==state.filterQuarter)return false;return true;});}
function gftp(){return state.taxPayments.filter(r=>new Date(r.Date+'T00:00:00').getFullYear()===state.filterYear);}
function gpl(){return state.filterQuarter>0?`Q${state.filterQuarter} ${state.filterYear}`:`${state.filterYear}`;}

// Deductible amount considering 50% rule
function deductibleAmount(exp){
  const amt=Number(exp.Amount)||0;
  if(!isDeductible(exp.TaxDeductible))return 0;
  if(HALF_DEDUCTIBLE.includes(exp.Category))return amt*0.5;
  return amt;
}

function notify(msg,type='success'){state.notification={msg,type};render();setTimeout(()=>{state.notification=null;render();},3000);}

async function testConnection(){
  const url=document.getElementById('webapp-url')?.value?.trim();
  if(!url){notify('Paste the Web App URL','error');return;}
  CONFIG.WEBAPP_URL=url;localStorage.setItem('10roof_webapp_url',url);
  state.loading=true;render();
  try{CONFIG.WEBAPP_URL=url;const r=await apiCall('getAll');
    state.income=r.income||[];state.expenses=r.expenses||[];state.taxPayments=r.taxPayments||[];state.mileage=r.mileage||[];
    state.configured=true;state.loading=false;notify('Connected!','success');render();
  }catch(e){state.loading=false;render();setTimeout(()=>{const el=document.getElementById('setup-status');if(el){el.className='setup-status error';el.textContent='Failed: '+e.message;}},50);}
}

// ─── RENDER ──────────────────────────────────────────────────

function renderTabs(){

function sc(l,v,s,c,i){return `<div class="stat-card"><div style="display:flex;justify-content:space-between;align-items:flex-start"><div><div class="stat-label">${l}</div><div class="stat-value" style="color:${c}">${v}</div><div class="stat-sub">${s}</div></div><span class="stat-icon">${i}</span></div></div>`;}
function miniB(l,d,m,c){const p=m>0?(d/m)*100:0;return `<div class="mini-bar"><div class="mini-bar-header"><span class="mini-bar-label">${l}</span><span class="mini-bar-val">${$(d)}</span></div><div class="mini-bar-track"><div class="mini-bar-fill" style="width:${Math.min(p,100)}%;background:${c}"></div></div></div>`;}

// ─── DASHBOARD ───────────────────────────────────────────────
function renderDash(inc,exp,mil){
  const ti=inc.reduce((s,r)=>s+(Number(r.FeeAmount)||0),0);
  const pi=inc.filter(r=>r.Status==='Paid').reduce((s,r)=>s+(Number(r.FeeAmount)||0),0);
  const pend=inc.filter(r=>r.Status!=='Paid').reduce((s,r)=>s+(Number(r.FeeAmount)||0),0);
  const te=exp.reduce((s,r)=>s+(Number(r.Amount)||0),0);
  const milAmt=mil.reduce((s,r)=>s+(Number(r.Amount)||0),0);
  const totalExp=te+milAmt;
  const de=exp.reduce((s,r)=>s+deductibleAmount(r),0)+milAmt;
  const net=pi-totalExp;
  const overdueCount=inc.filter(r=>r.Status==='Invoiced'&&r.DueDate&&new Date(r.DueDate)<new Date()).length;

  const cpl={};inc.forEach(r=>{const c=r.Client||'Other';if(!cpl[c])cpl[c]={r:0,n:0};cpl[c].r+=Number(r.FeeAmount)||0;cpl[c].n++;});
  const ebc={};exp.forEach(r=>{const c=r.Category||'Other';ebc[c]=(ebc[c]||0)+(Number(r.Amount)||0);});

  return `<div class="stats-grid">
    ${sc('Revenue',$(ti),inc.length+' placements','var(--accent)','↗')}
    ${sc('Collected',$(pi),inc.filter(r=>r.Status==='Paid').length+' paid','var(--green)','✓')}
    ${sc('Outstanding',$(pend),overdueCount>0?overdueCount+' overdue!':'pending','var(--gold)','◷')}
    ${sc('Expenses',$(totalExp),exp.length+' + '+mil.length+' mileage','var(--red)','↙')}
    ${sc('Net Income',$(net),'collected - expenses',net>=0?'var(--green)':'var(--red)','◎')}
    ${sc('Deductible',$(de),'tax deductible total','var(--blue)','⬡')}
  </div><div class="two-col">
    <div class="panel"><div class="panel-title">Revenue by Client</div>
      ${Object.entries(cpl).sort((a,b)=>b[1].r-a[1].r).map(([n,d])=>miniB(n+' ('+d.n+')',d.r,ti,'var(--accent)')).join('')}
      ${Object.keys(cpl).length===0?'<div class="empty" style="padding:10px">No income yet</div>':''}
    </div><div class="panel"><div class="panel-title">Expenses by Category</div>
      ${Object.entries(ebc).sort((a,b)=>b[1]-a[1]).map(([c,a])=>miniB(c,a,totalExp,'var(--gold)')).join('')}
      ${mil.length>0?miniB('Mileage',milAmt,totalExp,'var(--gold)'):''}
      ${Object.keys(ebc).length===0&&mil.length===0?'<div class="empty" style="padding:10px">No expenses yet</div>':''}
    </div></div>`;
}

function editIncome(id){
  const r=state.income.find(x=>x.ID===id);
  if(r)state.editingIncome={...r,Salary:String(r.Salary),FeePercent:String(r.FeePercent),FeeAmount:String(r.FeeAmount)};
  render();
}

    <div class="field"><label class="field-label">Fee %</label><input type="number" class="field-input" id="f-pct" value="${d.FeePercent}" step="0.5" onchange="state.editingIncome.FeePercent=this.value;autoFee()" /></div>
    <div class="field"><label class="field-label">Fee Amount</label><input type="number" class="field-input" id="f-fee" value="${d.FeeAmount}" onchange="state.editingIncome.FeeAmount=this.value" /></div>
    <div class="field"><label class="field-label">Status</label><select class="field-select" onchange="state.editingIncome.Status=this.value"><option value="">Select...</option>${o(INCOME_STATUS,d.Status)}</select></div>
    <div class="field"><label class="field-label">Payment Terms</label><input class="field-input" id="f-terms" value="${d.PaymentTerms||''}" placeholder="e.g. Net 30" onchange="state.editingIncome.PaymentTerms=this.value" /></div>
    <div class="field"><label class="field-label">Invoice Date</label><input type="date" class="field-input" id="f-invdate" value="${d.InvoiceDate||''}" onchange="state.editingIncome.InvoiceDate=this.value;autoCalcDue()" /></div>
    <div class="field"><label class="field-label">Due Date</label><input type="date" class="field-input" id="f-due" value="${d.DueDate||''}" onchange="state.editingIncome.DueDate=this.value" /></div>
    <div class="field"><label class="field-label">Notes</label><input class="field-input" id="f-desc" value="${d.Description||''}" onchange="state.editingIncome.Description=this.value" /></div>
  </div><div class="btn-row" style="margin-top:16px">
    <button class="btn btn-primary" onclick="saveIncome()">Save</button>
    <button class="btn btn-ghost" onclick="state.editingIncome=null;render()">Cancel</button></div></div>`;
}

function autoFee(){
  const s=Number(state.editingIncome.Salary)||0;const p=Number(state.editingIncome.FeePercent)||10;
  state.editingIncome.FeeAmount=(s*p/100).toFixed(2);
  const el=document.getElementById('f-fee');if(el)el.value=state.editingIncome.FeeAmount;
}
function autoCalcDue(){
  const inv=state.editingIncome.InvoiceDate;const terms=state.editingIncome.PaymentTerms||'';
  const match=terms.match(/(\d+)/);
  if(inv&&match){const days=Number(match[1]);const due=new Date(inv+'T00:00:00');due.setDate(due.getDate()+days);
    state.editingIncome.DueDate=due.toISOString().split('T')[0];
    const el=document.getElementById('f-due');if(el)el.value=state.editingIncome.DueDate;}
}

    <td class="mono red-text">${$(r.Amount)}</td><td>${isDeductible(r.TaxDeductible)?(isHalf?'50%':'✓'):'—'}</td>
    <td><button class="btn btn-ghost" onclick="editExpense('${r.ID}')">Edit</button>
    <button class="btn btn-ghost red" onclick="deleteRecord('Expenses','${r.ID}',state.expenses)">×</button></td></tr>`;}).join('')}
  </tbody></table>${exp.length===0?`<div class="empty">No expenses for ${pl}.</div>`:''}</div>`;
}

function editExpense(id){const r=state.expenses.find(x=>x.ID===id);if(r)state.editingExpense={...r,Amount:String(r.Amount)};render();}

function renderEF(){
  const d=state.editingExpense;const ed=state.expenses.some(r=>r.ID===d.ID);const dd=isDeductible(d.TaxDeductible);
  const o=(a,v)=>a.map(x=>`<option value="${x}" ${x===v?'selected':''}>${x}</option>`).join('');
  const isHalf=HALF_DEDUCTIBLE.includes(d.Category);
  return `<div class="form-panel"><div class="form-title">${ed?'Edit':'New'} Expense${isHalf?' <span style="color:var(--gold);font-size:12px">(50% deductible per IRS)</span>':''}</div><div class="form-grid">
    <div class="field"><label class="field-label">Date</label><input type="date" class="field-input" value="${d.Date}" onchange="state.editingExpense.Date=this.value" /></div>
    <div class="field"><label class="field-label">Category</label><select class="field-select" onchange="state.editingExpense.Category=this.value;if(this.value.includes('50%')){state.editingExpense.TaxDeductible='TRUE';}render()"><option value="">Select...</option>${o(EXPENSE_CATEGORIES,d.Category)}</select></div>
    <div class="field"><label class="field-label">Vendor</label><input class="field-input" value="${d.Vendor}" onchange="state.editingExpense.Vendor=this.value" /></div>
    <div class="field"><label class="field-label">Amount</label><input type="number" class="field-input" value="${d.Amount}" step="0.01" onchange="state.editingExpense.Amount=this.value" /></div>
    <div class="field"><label class="field-label">Description</label><input class="field-input" value="${d.Description||''}" onchange="state.editingExpense.Description=this.value" /></div>
    <div class="field" style="display:flex;align-items:flex-end;padding-bottom:2px">
      <div class="checkbox-field" onclick="state.editingExpense.TaxDeductible=isDeductible(state.editingExpense.TaxDeductible)?'FALSE':'TRUE';render()">
        <div class="checkbox-box ${dd?'checked':''}">${dd?'✓':''}</div>Tax Deductible</div></div>
  </div><div class="btn-row" style="margin-top:16px">
    <button class="btn btn-primary" onclick="saveExpense()">Save</button>
    <button class="btn btn-ghost" onclick="state.editingExpense=null;render()">Cancel</button></div></div>`;
}

// ─── MILEAGE ─────────────────────────────────────────────────
function renderMileage(mil,pl){
  const totalMiles=mil.reduce((s,r)=>s+(Number(r.Miles)||0),0);
  const totalAmt=mil.reduce((s,r)=>s+(Number(r.Amount)||0),0);
  return `<div class="section-header"><h2 class="section-title">Mileage Tracker</h2><div class="btn-row">
    <button class="btn btn-secondary" onclick="exportCSV(gfm(),['Date','Description','Miles','Rate','Amount'],'10roof-mileage-${pl}.csv')">↓ Export</button>
    <button class="btn btn-primary" onclick="state.editingMileage={ID:'',Date:'${today()}',Description:'',Miles:'',Rate:'${IRS_MILEAGE_RATE}',Amount:''};render()">+ New Trip</button>
  </div></div>
  <div class="stats-grid" style="margin-bottom:20px">
    ${sc('Total Miles',totalMiles.toLocaleString(),'trips: '+mil.length,'var(--accent)','⊙')}
    ${sc('Deduction',$(totalAmt),'$'+IRS_MILEAGE_RATE+'/mile (2025 IRS rate)','var(--green)','↙')}
  </div>
  ${state.editingMileage?renderMF():''}
  <div class="table-wrap"><table><thead><tr><th>Date</th><th>Description</th><th>Miles</th><th>Deduction</th><th></th></tr></thead><tbody>
  ${mil.map(r=>`<tr><td>${formatDate(r.Date)}</td><td>${r.Description}</td>
    <td class="mono">${Number(r.Miles).toLocaleString()}</td><td class="mono accent-text">${$(r.Amount)}</td>
    <td><button class="btn btn-ghost" onclick="state.editingMileage={...state.mileage.find(x=>x.ID==='${r.ID}'),Miles:String(state.mileage.find(x=>x.ID==='${r.ID}').Miles)};render()">Edit</button>
    <button class="btn btn-ghost red" onclick="deleteRecord('Mileage','${r.ID}',state.mileage)">×</button></td></tr>`).join('')}
  </tbody></table>${mil.length===0?`<div class="empty">No mileage for ${pl}. Click "+ New Trip" to log a drive.</div>`:''}</div>`;
}

function renderMF(){
  const d=state.editingMileage;const ed=state.mileage.some(r=>r.ID===d.ID);
  const miles=Number(d.Miles)||0;const est=(miles*IRS_MILEAGE_RATE).toFixed(2);
  return `<div class="form-panel"><div class="form-title">${ed?'Edit':'New'} Mileage Entry</div><div class="form-grid">
    <div class="field"><label class="field-label">Date</label><input type="date" class="field-input" value="${d.Date}" onchange="state.editingMileage.Date=this.value" /></div>
    <div class="field"><label class="field-label">Description</label><input class="field-input" value="${d.Description}" onchange="state.editingMileage.Description=this.value" placeholder="e.g. Client meeting downtown" /></div>
    <div class="field"><label class="field-label">Miles</label><input type="number" class="field-input" value="${d.Miles}" onchange="state.editingMileage.Miles=this.value;render()" /></div>
    <div class="field"><label class="field-label">Deduction</label><div style="padding:8px 12px;font-family:'Space Mono',monospace;font-size:13px;color:var(--accent)">${$(est)} <span style="font-size:10px;color:var(--text-dim)">@ $${IRS_MILEAGE_RATE}/mi</span></div></div>
  </div><div class="btn-row" style="margin-top:16px">
    <button class="btn btn-primary" onclick="saveMileage()">Save</button>
    <button class="btn btn-ghost" onclick="state.editingMileage=null;render()">Cancel</button></div></div>`;
}

// ─── CLIENT P&L ──────────────────────────────────────────────
function renderClients(inc,pl){
  const cp={};inc.forEach(r=>{const c=r.Client||'Other';if(!cp[c])cp[c]={r:0,n:0,rows:[]};cp[c].r+=Number(r.FeeAmount)||0;cp[c].n++;cp[c].rows.push(r);});
  return `<h2 class="section-title" style="margin-bottom:20px">Client P&L — ${pl}</h2>
    ${Object.entries(cp).sort((a,b)=>b[1].r-a[1].r).map(([n,d])=>{
      const avg=d.rows.reduce((s,r)=>s+(Number(r.Salary)||0),0)/d.rows.length;
      return `<div class="panel client-card"><div class="client-header"><div><div class="client-name">${n}</div>
        <div class="client-meta">${d.n} placement${d.n!==1?'s':''} · Avg: ${$(avg)}</div></div>
        <div class="client-total">${$(d.r)}</div></div>
        <div class="table-wrap"><table><thead><tr><th>Date</th><th>Candidate</th><th>Salary</th><th>Fee</th><th>Status</th></tr></thead><tbody>
        ${d.rows.map(r=>`<tr><td>${formatDate(r.Date)}</td><td>${r.Candidate}</td><td class="mono">${$(r.Salary)}</td>
          <td class="mono accent-text">${$(r.FeeAmount)}</td><td><span class="${badgeClass(r.Status)}">${r.Status}</span></td></tr>`).join('')}
        </tbody></table></div></div>`;}).join('')}
    ${Object.keys(cp).length===0?`<div class="empty">No data for ${pl}.</div>`:''}`;
}

// ─── AGING REPORT ────────────────────────────────────────────
function renderAging(inc){
  const invoiced=inc.filter(r=>r.Status==='Invoiced'||r.Status==='Overdue');
  const todayDate=today();
  const rows=invoiced.map(r=>{
    const invDate=r.InvoiceDate||r.Date;
    const age=daysBetween(invDate,todayDate);
    const dueDate=r.DueDate;
    const overdue=dueDate&&new Date(dueDate)<new Date();
    const daysOverdue=dueDate?daysBetween(dueDate,todayDate):0;
    return {...r,age,overdue,daysOverdue};
  }).sort((a,b)=>b.age-a.age);

  const totalOutstanding=rows.reduce((s,r)=>s+(Number(r.FeeAmount)||0),0);
  const overdueAmt=rows.filter(r=>r.overdue).reduce((s,r)=>s+(Number(r.FeeAmount)||0),0);

  return `<h2 class="section-title" style="margin-bottom:20px">Aging Report</h2>
    <div class="stats-grid" style="margin-bottom:20px">
      ${sc('Outstanding',$(totalOutstanding),rows.length+' invoices','var(--gold)','◷')}
      ${sc('Overdue',$(overdueAmt),rows.filter(r=>r.overdue).length+' past due','var(--red)','⚠')}
    </div>
    <div class="table-wrap"><table><thead><tr><th>Client</th><th>Candidate</th><th>Fee</th><th>Invoiced</th><th>Due Date</th><th>Age</th><th>Status</th></tr></thead><tbody>
    ${rows.map(r=>`<tr${r.overdue?' style="background:var(--red-dim)"':''}>
      <td style="font-weight:500">${r.Client}</td><td>${r.Candidate}</td>
      <td class="mono accent-text">${$(r.FeeAmount)}</td>
      <td>${formatDate(r.InvoiceDate||r.Date)}</td>
      <td>${r.DueDate?formatDate(r.DueDate):'—'}</td>
      <td class="mono" style="color:${r.overdue?'var(--red)':'var(--text)'}">${r.age}d${r.overdue?' (+'+r.daysOverdue+'d overdue)':''}</td>
      <td><span class="${r.overdue?'badge badge-overdue':'badge badge-invoiced'}">${r.overdue?'Overdue':'Invoiced'}</span></td>
    </tr>`).join('')}
    </tbody></table>
    ${rows.length===0?'<div class="empty">No outstanding invoices. All caught up!</div>':''}</div>`;
}

// ─── INVOICE ─────────────────────────────────────────────────

  const invNum='10R-'+String(r.Date||'').replace(/-/g,'')+'-'+String(r.ID).slice(-4).toUpperCase();
  return `
    ${state.notification?`<div class="notification ${state.notification.type}">${state.notification.msg}</div>`:''}
    <div style="padding:20px;max-width:850px;margin:0 auto">
      <div class="btn-row" style="margin-bottom:20px">
        <button class="btn btn-primary" onclick="window.print()">🖨 Print / Save as PDF</button>
        <button class="btn btn-secondary" onclick="state.invoiceData=null;render()">← Back</button>
      </div>
      <div class="invoice-container">
        <div class="invoice-header">
          <div><img src="${LOGO_B64}" class="invoice-logo" /><div style="font-size:10px;color:#888;margin-top:4px">10Roof</div></div>
          <div class="invoice-company">
            <strong>10Roof</strong>
            Technical Recruiting<br>
            Castle Rock, Colorado<br>
            jcrum@10-roof.com<br>
            10-roof.com
          </div>
        </div>
        <div style="display:flex;justify-content:space-between;margin-bottom:24px">
          <div><span style="font-size:24px;font-weight:700;color:#1a1d26">INVOICE</span></div>
          <div style="text-align:right;font-size:13px;color:#555">
            Invoice #: <strong>${invNum}</strong><br>
            Date: <strong>${formatDate(r.InvoiceDate||r.Date)}</strong><br>
            ${r.DueDate?'Due: <strong>'+formatDate(r.DueDate)+'</strong><br>':''}
            ${r.PaymentTerms?'Terms: <strong>'+r.PaymentTerms+'</strong>':''}
          </div>
        </div>
        <div class="invoice-meta">
          <div class="invoice-meta-box"><strong>Bill To</strong>${r.Client}</div>
          <div class="invoice-meta-box"><strong>Placement Details</strong>Candidate: ${r.Candidate}<br>Start Date: ${formatDate(r.Date)}</div>
        </div>
        <table class="invoice-table">
          <thead><tr><th>Description</th><th style="text-align:right">Base Salary</th><th style="text-align:right">Fee %</th><th style="text-align:right">Amount</th></tr></thead>
          <tbody><tr>
            <td>Placement Fee — ${r.Candidate}${r.Description?' ('+r.Description+')':''}</td>
            <td style="text-align:right">${$(r.Salary)}</td>
            <td style="text-align:right">${r.FeePercent}%</td>
            <td style="text-align:right;font-weight:700">${$(r.FeeAmount)}</td>
          </tr></tbody>
        </table>
        <div class="invoice-total">Total Due: ${$(r.FeeAmount)}</div>
        <div class="invoice-terms">
          <strong>Payment Terms:</strong> ${r.PaymentTerms||'As agreed'}<br>
          Please make payment to 10Roof. Thank you for your business.
        </div>
      </div>

}

// ─── TAX PREP ────────────────────────────────────────────────
function renderTax(inc,exp,mil){
  const p=inc.filter(r=>r.Status==='Paid').reduce((s,r)=>s+(Number(r.FeeAmount)||0),0);
  const de=exp.reduce((s,r)=>s+deductibleAmount(r),0);
  const milAmt=mil.reduce((s,r)=>s+(Number(r.Amount)||0),0);
  const totalDed=de+milAmt;
  const tx=p-totalDed;
  const ef=Math.max(0,tx*TAX_RATE_FEDERAL),es=Math.max(0,tx*TAX_RATE_STATE_CO),ese=Math.max(0,tx*TAX_RATE_SE),et=ef+es+ese;
  const tp=gftp(),paid=tp.reduce((s,r)=>s+(Number(r.Amount)||0),0),rem=Math.max(0,et-paid);

  // P&L Summary
  const totalExp=exp.reduce((s,r)=>s+(Number(r.Amount)||0),0);
  const halfCats=exp.filter(r=>HALF_DEDUCTIBLE.includes(r.Category));
  const halfTotal=halfCats.reduce((s,r)=>s+(Number(r.Amount)||0),0);

  return `<h2 class="section-title" style="margin-bottom:20px">Tax Prep & P&L — ${state.filterYear}</h2>
    <div class="stats-grid">${sc('Gross (Paid)',$(p),inc.filter(r=>r.Status==='Paid').length+' placements','var(--accent)','↗')}${sc('Deductions',$(totalDed),'expenses + mileage','var(--gold)','↙')}${sc('Taxable',$(tx),'','var(--text)','◎')}</div>

    <div class="panel" style="margin-bottom:20px">
      <div class="panel-title">Annual P&L Summary</div>
      <table style="width:100%"><tbody>
        <tr><td style="font-weight:600;padding:6px 0">Gross Income (Paid)</td><td class="mono" style="text-align:right;padding:6px 0;color:var(--accent)">${$(p)}</td></tr>
        <tr><td colspan="2" style="padding:10px 0 4px;font-size:11px;color:var(--text-muted);text-transform:uppercase">Deductions</td></tr>
        ${Object.entries(exp.reduce((acc,r)=>{if(isDeductible(r.TaxDeductible)){const c=r.Category||'Other';acc[c]=(acc[c]||0)+deductibleAmount(r);}return acc;},{})).sort((a,b)=>b[1]-a[1]).map(([c,a])=>`<tr><td style="padding:4px 0 4px 16px;color:var(--text-muted)">${c}</td><td class="mono" style="text-align:right;padding:4px 0;color:var(--red)">(${$(a)})</td></tr>`).join('')}
        ${milAmt>0?`<tr><td style="padding:4px 0 4px 16px;color:var(--text-muted)">Mileage (${mil.reduce((s,r)=>s+(Number(r.Miles)||0),0)} mi)</td><td class="mono" style="text-align:right;padding:4px 0;color:var(--red)">(${$(milAmt)})</td></tr>`:''}
        <tr style="border-top:1px solid var(--border)"><td style="font-weight:600;padding:8px 0">Total Deductions</td><td class="mono" style="text-align:right;padding:8px 0;color:var(--red)">(${$(totalDed)})</td></tr>
        <tr style="border-top:2px solid var(--accent)"><td style="font-weight:700;padding:10px 0;font-size:15px">Net Taxable Income</td><td class="mono" style="text-align:right;padding:10px 0;font-size:15px;font-weight:700;color:${tx>=0?'var(--green)':'var(--red)'}">${$(tx)}</td></tr>
      </tbody></table>
      ${halfTotal>0?`<div style="margin-top:12px;font-size:11px;color:var(--gold)">* Client Meals & Entertainment: ${$(halfTotal)} total, ${$(halfTotal*0.5)} deductible (50% IRS rule)</div>`:''}
    </div>

    <div class="two-col" style="margin-bottom:28px">
      <div class="panel"><div class="panel-title">Tax Breakdown</div>
        ${miniB('Federal (22%)',ef,et,'var(--blue)')}${miniB('Colorado (4.4%)',es,et,'var(--accent)')}${miniB('SE Tax (15.3%)',ese,et,'var(--gold)')}
        <div class="tax-divider"><span class="tax-label">Total</span><span class="mono" style="font-size:16px;font-weight:700;color:var(--red)">${$(et)}</span></div>
        <div class="tax-row"><span style="font-size:12px;color:var(--text-muted)">Quarterly</span><span class="mono" style="font-size:13px;color:var(--text-muted)">${$(et/4)}</span></div></div>
      <div class="panel"><div class="panel-title">Payments Made</div>
        ${tp.map(r=>`<div class="tax-payment-row"><span>${formatDate(r.Date)} — ${r.Type}</span><div style="display:flex;gap:10px;align-items:center">
          <span class="mono" style="color:var(--green)">${$(r.Amount)}</span>
          <button class="btn btn-ghost red" onclick="deleteRecord('TaxPayments','${r.ID}',state.taxPayments)">×</button></div></div>`).join('')}
        ${tp.length===0?'<div style="color:var(--text-dim);font-size:13px;margin-bottom:12px">None recorded</div>':''}
        <div class="tax-divider" style="flex-direction:column;gap:8px">
          <div style="display:flex;justify-content:space-between"><span class="tax-label">Paid</span><span class="mono" style="color:var(--green)">${$(paid)}</span></div>
          <div style="display:flex;justify-content:space-between"><span class="tax-label" style="color:var(--red)">Remaining</span><span class="mono" style="color:var(--red)">${$(rem)}</span></div></div>
        <div style="margin-top:16px"><button class="btn btn-secondary" onclick="addTaxPayment()">+ Record Payment</button></div></div></div>
    <div class="disclaimer"><strong>⚠ Disclaimer:</strong> Rough estimates using flat rates. Client meals & entertainment at 50% per IRS rules. Consult a CPA. CO quarterly due: Apr 15, Jun 15, Sep 15, Jan 15.</div>`;
}

// ─── INIT ────────────────────────────────────────────────────
const savedUrl=localStorage.getItem('10roof_webapp_url');
if(savedUrl){CONFIG.WEBAPP_URL=savedUrl;state.configured=true;render();loadAllData();}
else{render();}
</script>
