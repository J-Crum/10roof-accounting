<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>10Roof Accounting</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600;700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{--bg:#0f1117;--sf:#181b24;--cd:#1c1f2b;--ca:#212536;--bd:#2a2e3d;--bl:#353a4d;--tx:#e8eaf0;--tm:#8b90a5;--td:#5c6178;--ac:#3ecfb4;--ad:#2a9e87;--ag:rgba(62,207,180,.12);--gl:#d4a853;--rd:#e85c5c;--rdm:rgba(232,92,92,.12);--gn:#4ecb8d;--gnm:rgba(78,203,141,.12);--bu:#5b9cf5;--bum:rgba(91,156,245,.12)}
body{background:var(--bg);color:var(--tx);font-family:'DM Sans',sans-serif;min-height:100vh;line-height:1.5}
::-webkit-scrollbar{width:6px;height:6px}::-webkit-scrollbar-track{background:var(--bg)}::-webkit-scrollbar-thumb{background:var(--bd);border-radius:3px}

.auth{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;gap:20px;padding:20px}
.abox{width:min(380px,90vw);background:var(--cd);border:1px solid var(--bd);border-radius:12px;padding:32px;text-align:center}
.abox input{width:100%;padding:12px;background:var(--bg);border:1px solid var(--bd);border-radius:8px;color:var(--tx);font-size:14px;font-family:'DM Sans',sans-serif;outline:none;margin-top:12px;text-align:center;letter-spacing:2px}
.abox input:focus{border-color:var(--ac)}
.aerr{color:var(--rd);font-size:13px;margin-top:8px;min-height:20px}

.setup{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;gap:20px;padding:20px}
.sbox{width:min(540px,92vw);background:var(--cd);border:1px solid var(--bd);border-radius:12px;padding:24px}
.sbox h3{font-size:14px;font-weight:600;margin-bottom:16px;color:var(--ac)}
.sbox label{display:block;font-size:11px;color:var(--tm);text-transform:uppercase;letter-spacing:.5px;margin-bottom:4px;margin-top:14px}
.sbox input{width:100%;padding:10px 12px;background:var(--bg);border:1px solid var(--bd);border-radius:6px;color:var(--tx);font-size:12px;font-family:'Space Mono',monospace;outline:none}
.sbox input:focus{border-color:var(--ac)}
.snote{margin-top:14px;font-size:12px;color:var(--td);line-height:1.6}
.sbtn{display:block;width:100%;padding:12px;margin-top:20px;background:var(--ac);color:var(--bg);border:none;border-radius:8px;font-size:14px;font-weight:600;font-family:'DM Sans',sans-serif;cursor:pointer}
.sbtn:hover{filter:brightness(1.1)}
.sstat{margin-top:12px;padding:10px 14px;border-radius:8px;font-size:13px;display:none}
.sstat.ok{display:block;background:var(--gnm);color:var(--gn);border:1px solid var(--gn)}
.sstat.err{display:block;background:var(--rdm);color:var(--rd);border:1px solid var(--rd)}
.sn{display:inline-flex;align-items:center;justify-content:center;width:22px;height:22px;border-radius:50%;background:var(--ac);color:var(--bg);font-size:11px;font-weight:700;margin-right:6px}

.hd{border-bottom:1px solid var(--bd);padding:14px 28px;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:12px}
.hd-l{display:flex;align-items:center;gap:12px}
.logo{width:38px;height:38px;border-radius:8px}
.hd-t{font-weight:700;font-size:16px}
.hd-s{font-size:11px;color:var(--td)}
.hd-c{display:flex;gap:8px;align-items:center;flex-wrap:wrap}
.hsel,.hinp{padding:6px 10px;background:var(--bg);border:1px solid var(--bd);border-radius:6px;color:var(--tx);font-size:12px;font-family:'DM Sans',sans-serif}
.hinp{width:80px}

.tabs{padding:10px 28px;display:flex;gap:4px;border-bottom:1px solid var(--bd);overflow-x:auto}
.tab{padding:8px 14px;background:transparent;border:1px solid transparent;border-radius:8px;color:var(--tm);cursor:pointer;font-size:13px;font-family:'DM Sans',sans-serif;display:flex;align-items:center;gap:6px;transition:all .2s;white-space:nowrap}
.tab:hover{color:var(--tx);background:var(--sf)}
.tab.on{background:var(--ag);border-color:var(--ad);color:var(--ac);font-weight:600}

.ct{padding:24px 28px;max-width:1200px;margin:0 auto}
.sg{display:flex;flex-wrap:wrap;gap:14px;margin-bottom:24px}
.sc{background:var(--cd);border:1px solid var(--bd);border-radius:12px;padding:18px 20px;flex:1 1 170px;min-width:155px}
.scl{font-size:10px;color:var(--tm);text-transform:uppercase;letter-spacing:.8px;margin-bottom:6px}
.scv{font-size:21px;font-weight:700;font-family:'Space Mono',monospace}
.scs{font-size:11px;color:var(--td);margin-top:3px}
.sci{font-size:18px;opacity:.5}

.pn{background:var(--cd);border:1px solid var(--bd);border-radius:12px;padding:22px}
.pt{font-size:12px;color:var(--tm);text-transform:uppercase;letter-spacing:.8px;margin-bottom:16px}
.tc{display:flex;gap:20px;flex-wrap:wrap}.tc>*{flex:1 1 300px}

.mb{margin-bottom:8px}.mbh{display:flex;justify-content:space-between;margin-bottom:3px}
.mbl{font-size:12px;color:var(--tm)}.mbv{font-size:12px;color:var(--tx);font-weight:600}
.mbt{height:6px;background:var(--bd);border-radius:3px}.mbf{height:6px;border-radius:3px;transition:width .5s ease}

.btn{padding:8px 16px;border:none;border-radius:6px;cursor:pointer;font-size:13px;font-family:'DM Sans',sans-serif;display:inline-flex;align-items:center;gap:6px;transition:all .2s}
.btn:hover{filter:brightness(1.1)}
.bp{background:var(--ac);color:var(--bg);font-weight:600}
.bs{background:var(--ca);color:var(--tm);border:1px solid var(--bd)}
.bg{background:transparent;color:var(--tm);padding:4px 8px;font-size:12px}.bg:hover{color:var(--tx)}.bg.r{color:var(--rd)}
.br{display:flex;gap:8px;flex-wrap:wrap}

.sh{display:flex;justify-content:space-between;align-items:center;margin-bottom:20px;flex-wrap:wrap;gap:10px}
.st{font-size:18px;font-weight:600}

.fp{background:var(--cd);border:1px solid var(--bl);border-radius:12px;padding:24px;margin-bottom:20px}
.fpt{font-size:14px;font-weight:600;margin-bottom:16px}
.fg{display:grid;grid-template-columns:repeat(auto-fit,minmax(175px,1fr));gap:14px}
.fl{display:flex;flex-direction:column;gap:4px}
.fll{font-size:11px;color:var(--tm);font-weight:500;text-transform:uppercase;letter-spacing:.5px}
.fi,.fs{width:100%;padding:8px 12px;background:var(--bg);border:1px solid var(--bd);border-radius:6px;color:var(--tx);font-size:13px;font-family:'DM Sans',sans-serif;outline:none}
.fi:focus,.fs:focus{border-color:var(--ac)}.fs{cursor:pointer}

.tw{overflow-x:auto}
table{width:100%;border-collapse:collapse}
th{padding:10px 12px;text-align:left;font-size:11px;color:var(--td);text-transform:uppercase;letter-spacing:.5px;font-weight:500;border-bottom:1px solid var(--bd)}
td{padding:10px 12px;font-size:13px;border-bottom:1px solid var(--bd)}
.m{font-family:'Space Mono',monospace}.at{color:var(--ac);font-weight:600}.rt{color:var(--rd)}
.badge{font-size:11px;padding:3px 10px;border-radius:12px;font-weight:500;display:inline-block}
.b-paid{background:var(--gnm);color:var(--gn)}.b-invoiced,.b-pending{background:var(--bum);color:var(--bu)}.b-overdue{background:var(--rdm);color:var(--rd)}

.empty{padding:40px;text-align:center;color:var(--td);font-size:13px}
.lo{position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(15,17,23,.85);display:flex;align-items:center;justify-content:center;z-index:1000;color:var(--tm);font-size:14px}
.spin{width:24px;height:24px;border:2px solid var(--bd);border-top-color:var(--ac);border-radius:50%;animation:sp .8s linear infinite;margin-right:12px}
@keyframes sp{to{transform:rotate(360deg)}}
.nf{position:fixed;top:20px;right:20px;z-index:999;padding:12px 20px;border-radius:8px;font-size:13px;font-weight:500;animation:fi .3s ease}
.nf.ok{background:var(--gnm);color:var(--gn);border:1px solid var(--gn)}
.nf.er{background:var(--rdm);color:var(--rd);border:1px solid var(--rd)}
.nf.in{background:var(--bum);color:var(--bu);border:1px solid var(--bu)}
@keyframes fi{from{opacity:0;transform:translateY(-8px)}to{opacity:1;transform:translateY(0)}}

.inv{background:#fff;color:#1a1d26;padding:40px;border-radius:12px;max-width:800px;margin:0 auto}
.inv-h{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:30px;border-bottom:3px solid #3ecfb4;padding-bottom:20px}
.inv-co{text-align:right;font-size:13px;color:#555;line-height:1.6}.inv-co strong{color:#1a1d26;font-size:18px;display:block;margin-bottom:4px}
.inv-m{display:grid;grid-template-columns:1fr 1fr;gap:20px;margin-bottom:30px}
.inv-mb{font-size:13px;line-height:1.8}.inv-mb strong{display:block;font-size:12px;text-transform:uppercase;color:#888;letter-spacing:.5px;margin-bottom:4px}
.inv-t{width:100%;border-collapse:collapse;margin-bottom:30px}
.inv-t th{background:#f5f7fa;padding:10px 14px;text-align:left;font-size:11px;text-transform:uppercase;color:#666;border-bottom:2px solid #e0e0e0}
.inv-t td{padding:12px 14px;font-size:14px;border-bottom:1px solid #eee}
.inv-tot{text-align:right;font-size:20px;font-weight:700;color:#1a1d26;margin-bottom:20px}
.inv-pay{font-size:13px;color:#333;line-height:1.8;border-top:2px solid #3ecfb4;padding-top:16px;margin-bottom:16px}
.inv-ft{font-size:11px;color:#999;line-height:1.6;border-top:1px solid #eee;padding-top:12px}
.disc{background:var(--ca);border:1px solid var(--bd);border-radius:12px;padding:20px;font-size:12px;color:var(--tm);line-height:1.7}.disc strong{color:var(--gl)}

.cpw{background:var(--cd);border:1px solid var(--bd);border-radius:12px;padding:24px;max-width:400px;margin:20px auto}
.cpw input{width:100%;padding:10px 12px;background:var(--bg);border:1px solid var(--bd);border-radius:6px;color:var(--tx);font-size:13px;font-family:'DM Sans',sans-serif;outline:none;margin-top:8px;letter-spacing:2px}

@media print{body{background:#fff!important}.hd,.tabs,.sh,.nf,.br{display:none!important}.ct{padding:0;max-width:none}.inv{box-shadow:none;padding:20px}}
@media(max-width:640px){.hd,.tabs,.ct{padding-left:16px;padding-right:16px}.sc{min-width:140px}.scv{font-size:18px}.fg{grid-template-columns:1fr}}
select option{background:var(--sf);color:var(--tx)}
input[type="date"]::-webkit-calendar-picker-indicator{filter:invert(.7)}
</style>
</head>
<body>
<div id="app"></div>
<script>
const LOGO="data:image/png;base64,iVBORw0KGgoAAAANSUhEUgAAAGQAAABkCAMAAABHPGVmAAAAOVBMVEUAAAC7u7vu7u7d3d3////MzMzu/+6IiIhVVVUzMzMiIiIRERFERERmZmaZmZmqqqp3d3d3iHdmd3fV766nAAABtUlEQVRo3u3abW+DIBAAYDlkIC9C9/9/7LZkTQQ5EJBm6e4+tsqjh6AeLgtFYzDg0wLYL8LXicF/ETETEYQQQsgKMBP5YFJt2vyEtm7nnYjf7DNOTQhlkhlQB96BwKGZZBOxZWdaB82IPeweH2RAJ3TfiLgFQ2zhthGakMiIEFu8OYUGJGmJY/o59quI0AuGsOqNll9CwBV23KqIuoBAMIWj8+k/etPFU8kg4FU5BSozMrgr9P0ZsbU8g8k2Fyu6jJgaIqJfzXOEA56vM6JryI50cZwCNoYEJPlxvuQYopBx90B7/kZExtfcGGIRJKDDsePqskjuW5BdPuMxDzmEeQECfxBxhBBCCCH3Ip9vM0ESQgghL0YUIfcjjpD/iYQxxF16kJBjCPaWa9EiYQcSF4k2ZGsxhvAl25rMl1w6keRNX4tMxWWx6yCSFvVskCEt5slRRFxY7YNRpFKwTYdiJ1I9FQPjSHIlVSvpfUil+izXW5DCesCpvt2PrAwrWWmx3oZ8d0yO0XvrIg0Xx8gsEyVLQdqxKQtnwkunrFUu7IzTOiMhhBDyjshLPvPxfGJ4+iCsNb4A1jpoPLOb+KIAAAAASUVORK5CYII=";
const FALLBACK_HASH='1d655aef7d29f4987990154d57eaa792c6d7f6c77b8f25f0842df9470b033ce3';

let CFG={URL:''};
const CATS=['Client Meals & Entertainment (50%)','Cell Phone','Office Supplies','LinkedIn Recruiter/Premium','Software & Subscriptions','Job Board Postings','Travel (flights, hotels)','Vehicle/Mileage','Professional Development','Marketing & Advertising','Insurance (E&O, General)','Professional Services (Legal, CPA)','Home Office','Miscellaneous'];
const HALF=['Client Meals & Entertainment (50%)'];
const CLI=['Stream Data Centers','NICE','Hotwire Communications','Focus Financial Partners','Other'];
const STS=['Pending','Invoiced','Paid','Overdue'];
const FED=.22,CO=.044,SE=.153,MPM=.70;

const uid=()=>Date.now().toString(36)+Math.random().toString(36).slice(2,7);
const now=()=>new Date().toISOString().split('T')[0];
const fc=n=>{const v=Number(n)||0;const f=Math.abs(v).toLocaleString('en-US',{minimumFractionDigits:2,maximumFractionDigits:2});return v<0?'-$'+f:'$'+f;};
const fd=d=>{if(!d)return'';const dt=new Date(String(d));return isNaN(dt)?'':dt.toLocaleDateString('en-US',{month:'short',day:'numeric',year:'numeric'});};
const ds=d=>{if(!d)return'';const dt=new Date(String(d));return isNaN(dt)?'':dt.toISOString().split('T')[0];};
const bc=s=>'badge b-'+(s||'pending').toLowerCase();
const isDed=v=>v==='TRUE'||v==='true'||v===true;
const dedA=r=>{const a=Number(r.Amount)||0;if(!isDed(r.TaxDeductible))return 0;return HALF.includes(r.Category)?a*.5:a;};
const pY=d=>{if(!d)return 0;const dt=new Date(String(d));return isNaN(dt)?0:dt.getFullYear();};
const pQ=d=>{if(!d)return 0;const dt=new Date(String(d));return isNaN(dt)?0:Math.ceil((dt.getMonth()+1)/3);};
async function sha(m){const b=await crypto.subtle.digest('SHA-256',new TextEncoder().encode(m));return Array.from(new Uint8Array(b)).map(x=>x.toString(16).padStart(2,'0')).join('');}

const S={auth:false,cfg:false,loading:false,tab:'dashboard',yr:new Date().getFullYear(),qtr:0,
  inc:[],exp:[],tp:[],mil:[],ei:null,ee:null,em:null,nf:null,inv:null,pwHash:null,showPwChange:false};

// API
async function api(action,data={}){
  const r=await fetch(CFG.URL,{method:'POST',mode:'cors',redirect:'follow',body:JSON.stringify({action,...data})});
  const t=await r.text();let res;try{res=JSON.parse(t);}catch(e){throw new Error('Bad response');}
  if(res.error)throw new Error(res.error);return res;
}

// Password from Settings sheet
async function getPwHash(){
  try{
    const r=await api('getAll');
    const settings=r.settings||[];
    const pw=settings.find(s=>s.Key==='password_hash');
    return pw?pw.Value:null;
  }catch(e){return null;}
}
async function setPwHash(hash){
  try{
    const r=await api('getAll');
    const settings=r.settings||[];
    const idx=settings.findIndex(s=>s.Key==='password_hash');
    if(idx>=0){await api('updateRow',{sheet:'Settings',rowIndex:idx,data:{Key:'password_hash',Value:hash}});}
    else{await api('addRow',{sheet:'Settings',data:{Key:'password_hash',Value:hash}});}
    return true;
  }catch(e){notify('Error saving password: '+e.message,'er');return false;}
}

async function tryLogin(){
  const pw=document.getElementById('pw')?.value||'';
  if(!pw){document.getElementById('ae').textContent='Enter password';return;}
  const hash=await sha(pw);
  // Get stored hash
  let stored=S.pwHash;
  if(!stored){
    stored=await getPwHash();
    S.pwHash=stored;
  }
  // First time — no hash set yet, set it now
  if(!stored){
    await setPwHash(hash);
    S.pwHash=hash;S.auth=true;sessionStorage.setItem('10r_a','1');
    notify('Password set!','ok');render();return;
  }
  if(hash===stored||hash===FALLBACK_HASH){
    S.auth=true;sessionStorage.setItem('10r_a','1');render();
  }else{document.getElementById('ae').textContent='Incorrect password';}
}

async function changePw(){
  const cur=document.getElementById('cpw-cur')?.value||'';
  const nw=document.getElementById('cpw-new')?.value||'';
  const nw2=document.getElementById('cpw-new2')?.value||'';
  if(!cur||!nw){notify('Fill all fields','er');return;}
  if(nw!==nw2){notify('New passwords don\'t match','er');return;}
  const curHash=await sha(cur);
  if(curHash!==S.pwHash&&curHash!==FALLBACK_HASH){notify('Current password incorrect','er');return;}
  const newHash=await sha(nw);
  const ok=await setPwHash(newHash);
  if(ok){S.pwHash=newHash;S.showPwChange=false;notify('Password changed!','ok');render();}
}

// Load all
async function loadAll(){
  S.loading=true;render();
  try{
    const r=await api('getAll');
    S.inc=(r.income||[]).map(nI);S.exp=(r.expenses||[]).map(nE);
    S.tp=(r.taxPayments||[]).map(nTP);S.mil=(r.mileage||[]).map(nM);
    const settings=r.settings||[];
    const pw=settings.find(s=>s.Key==='password_hash');
    if(pw)S.pwHash=pw.Value;
  }catch(e){notify('Load error: '+e.message,'er');}
  S.loading=false;render();
}

// Normalize
function nI(r){return{ID:r.ID||'',Date:ds(r.Date),Client:r.Client||'',Candidate:r.Candidate||'',Salary:Number(r.Salary)||0,FeePercent:Number(r.FeePercent)||0,FeeAmount:Number(r.FeeAmount)||0,Description:r.Description||'',Status:r.Status||'Pending',PaymentTerms:r.PaymentTerms||'',InvoiceDate:ds(r.InvoiceDate),DueDate:ds(r.DueDate),PositionTitle:r.PositionTitle||'',StartDate:ds(r.StartDate),ClientContact:r.ClientContact||''};}
function nE(r){return{ID:r.ID||'',Date:ds(r.Date),Category:r.Category||'',Vendor:r.Vendor||'',Amount:Number(r.Amount)||0,Description:r.Description||'',TaxDeductible:r.TaxDeductible||'TRUE'};}
function nTP(r){return{ID:r.ID||'',Date:ds(r.Date),Type:r.Type||'',Amount:Number(r.Amount)||0,Notes:r.Notes||''};}
function nM(r){return{ID:r.ID||'',Date:ds(r.Date),Description:r.Description||'',Miles:Number(r.Miles)||0,Rate:Number(r.Rate)||MPM,Amount:Number(r.Amount)||0};}

// CRUD
async function saveRec(sheet,data,arr,key){
  S.loading=true;render();
  try{
    const idx=arr.findIndex(r=>r.ID===data.ID);
    if(idx>=0)await api('updateRow',{sheet,rowIndex:idx,data});
    else await api('addRow',{sheet,data});
    S[key]=null;
    const r=await api('getAll');
    S.inc=(r.income||[]).map(nI);S.exp=(r.expenses||[]).map(nE);
    S.tp=(r.taxPayments||[]).map(nTP);S.mil=(r.mileage||[]).map(nM);
    S.loading=false;notify('Saved','ok');
  }catch(e){S.loading=false;notify('Error: '+e.message,'er');render();}
}
async function delRec(sheet,id,arr){
  if(!confirm('Delete?'))return;S.loading=true;render();
  try{const i=arr.findIndex(r=>r.ID===id);if(i>=0)await api('deleteRow',{sheet,rowIndex:i});
    const r=await api('getAll');S.inc=(r.income||[]).map(nI);S.exp=(r.expenses||[]).map(nE);
    S.tp=(r.taxPayments||[]).map(nTP);S.mil=(r.mileage||[]).map(nM);
    S.loading=false;notify('Deleted','in');render();
  }catch(e){S.loading=false;notify('Error: '+e.message,'er');render();}
}

function saveI(){
  const f=S.ei;if(!f)return;
  const sal=Number(f.Salary)||0,pct=Number(f.FeePercent)||10;
  const fee=f.FeeAmount||(sal*pct/100).toFixed(2);
  saveRec('Income',{ID:f.ID||uid(),Date:f.Date||now(),Client:f.Client,Candidate:f.Candidate,Salary:f.Salary,FeePercent:f.FeePercent||'10',FeeAmount:fee,Description:f.Description||'',Status:f.Status||'Pending',PaymentTerms:f.PaymentTerms||'',InvoiceDate:f.InvoiceDate||'',DueDate:f.DueDate||'',PositionTitle:f.PositionTitle||'',StartDate:f.StartDate||'',ClientContact:f.ClientContact||''},S.inc,'ei');
}
function saveE(){const f=S.ee;if(!f)return;saveRec('Expenses',{ID:f.ID||uid(),Date:f.Date||now(),Category:f.Category,Vendor:f.Vendor,Amount:f.Amount,Description:f.Description||'',TaxDeductible:f.TaxDeductible||'TRUE'},S.exp,'ee');}
function saveM(){const f=S.em;if(!f)return;const mi=Number(f.Miles)||0;saveRec('Mileage',{ID:f.ID||uid(),Date:f.Date||now(),Description:f.Description||'',Miles:f.Miles,Rate:String(MPM),Amount:(mi*MPM).toFixed(2)},S.mil,'em');}
async function addTP(){
  const a=prompt('Amount:');if(!a)return;const d=prompt('Date (YYYY-MM-DD):',now());if(!d)return;
  const t=prompt('Type (Federal/State/SE):','Federal');
  S.loading=true;render();
  try{await api('addRow',{sheet:'Tax Payments',data:{ID:uid(),Date:d,Type:t||'Federal',Amount:a,Notes:''}});await loadAll();}
  catch(e){notify('Error: '+e.message,'er');S.loading=false;render();}
}

// Filter
const flt=r=>{const y=pY(r.Date);if(y!==S.yr)return false;if(S.qtr>0&&pQ(r.Date)!==S.qtr)return false;return true;};
const gi=()=>S.inc.filter(flt),ge=()=>S.exp.filter(flt),gm=()=>S.mil.filter(flt),gtp=()=>S.tp.filter(r=>pY(r.Date)===S.yr);
const gpl=()=>S.qtr>0?`Q${S.qtr} ${S.yr}`:`${S.yr}`;
function notify(m,t='ok'){S.nf={m,t};render();setTimeout(()=>{S.nf=null;render();},3000);}
function xCSV(rows,cols,fn){const h=cols.join(',')+'\n';const b=rows.map(r=>cols.map(c=>`"${r[c]||''}"`).join(',')).join('\n');const bl=new Blob([h+b],{type:'text/csv'});const u=URL.createObjectURL(bl);const a=document.createElement('a');a.href=u;a.download=fn;a.click();URL.revokeObjectURL(u);}

async function testConn(){
  const u=document.getElementById('wu')?.value?.trim();
  if(!u){notify('Paste URL','er');return;}
  CFG.URL=u;localStorage.setItem('10r_u',u);
  S.loading=true;render();
  try{CFG.URL=u;await loadAll();S.cfg=true;render();}
  catch(e){S.loading=false;render();setTimeout(()=>{const el=document.getElementById('ss');if(el){el.className='sstat err';el.textContent='Failed: '+e.message;}},50);}
}

// ─── RENDER ──────────────────────────────────────────────
function render(){
  const a=document.getElementById('app');
  if(!S.auth&&sessionStorage.getItem('10r_a')!=='1'){a.innerHTML=rAuth();return;}
  S.auth=true;
  if(!S.cfg){a.innerHTML=rSetup();return;}
  if(S.showPwChange){a.innerHTML=rPwChange();return;}
  if(S.inv){a.innerHTML=rInv(S.inv);return;}
  const inc=gi(),exp=ge(),mil=gm(),p=gpl();
  a.innerHTML=`${S.loading?'<div class="lo"><div class="spin"></div>Syncing...</div>':''}${S.nf?`<div class="nf ${S.nf.t}">${S.nf.m}</div>`:''}${rHdr(p)}${rTabs()}
    <div class="ct">${S.tab==='dashboard'?rDash(inc,exp,mil):''}${S.tab==='income'?rInc(inc,p):''}${S.tab==='expenses'?rExp(exp,p):''}${S.tab==='mileage'?rMil(mil,p):''}${S.tab==='clients'?rCli(inc,p):''}${S.tab==='aging'?rAge(inc):''}${S.tab==='tax'?rTax(inc,exp,mil):''}</div>`;
}

function rAuth(){
  return `<div class="auth"><img src="${LOGO}" style="width:64px;height:64px;border-radius:12px"/>
    <div style="font-size:24px;font-weight:700">10Roof Accounting</div>
    <div class="abox"><div style="font-size:14px;color:var(--tm)">Enter password</div>
      <input type="password" id="pw" placeholder="Password" onkeydown="if(event.key==='Enter')tryLogin()" autofocus/>
      <div id="ae" class="aerr"></div>
      <button class="sbtn" style="margin-top:16px" onclick="tryLogin()">Sign In</button>
    </div></div>`;}

function rSetup(){
  const sv=localStorage.getItem('10r_u')||'';
  return `${S.loading?'<div class="lo"><div class="spin"></div>Connecting...</div>':''}${S.nf?`<div class="nf ${S.nf.t}">${S.nf.m}</div>`:''}
    <div class="setup"><img src="${LOGO}" style="width:64px;height:64px;border-radius:12px"/>
      <div style="font-size:24px;font-weight:700">10Roof Accounting</div>
      <div class="sbox"><h3><span class="sn">1</span> Connect</h3>
        <label>Web App URL</label><input id="wu" value="${sv}" placeholder="https://script.google.com/macros/s/..."/>
        <div id="ss" class="sstat"></div>
        <button class="sbtn" onclick="testConn()">Connect & Load Data</button>
        <div class="snote">Your Apps Script Web App URL.</div>
      </div></div>`;}

function rPwChange(){
  return `${S.nf?`<div class="nf ${S.nf.t}">${S.nf.m}</div>`:''}
    <div class="auth"><img src="${LOGO}" style="width:64px;height:64px;border-radius:12px"/>
      <div style="font-size:20px;font-weight:700;margin-bottom:8px">Change Password</div>
      <div class="cpw">
        <label style="font-size:12px;color:var(--tm)">Current Password</label>
        <input type="password" id="cpw-cur" placeholder="Current"/>
        <label style="font-size:12px;color:var(--tm);margin-top:12px;display:block">New Password</label>
        <input type="password" id="cpw-new" placeholder="New"/>
        <label style="font-size:12px;color:var(--tm);margin-top:12px;display:block">Confirm New Password</label>
        <input type="password" id="cpw-new2" placeholder="Confirm"/>
        <div class="br" style="margin-top:20px;justify-content:center">
          <button class="btn bp" onclick="changePw()">Update Password</button>
          <button class="btn bg" onclick="S.showPwChange=false;render()">Cancel</button>
        </div>
      </div></div>`;}

function rHdr(p){
  return `<div class="hd"><div class="hd-l"><img src="${LOGO}" class="logo"/><div>
    <div class="hd-t">10Roof Accounting</div><div class="hd-s">Technical Recruiting · ${p}</div></div></div>
    <div class="hd-c">

function rTabs(){
  const t=[['dashboard','Dashboard','◎'],['income','Income','↗'],['expenses','Expenses','↙'],['mileage','Mileage','⊙'],['clients','Client P&L','◈'],['aging','Aging','◷'],['tax','Tax Prep','⬡']];
  return `<div class="tabs">${t.map(([id,l,i])=>`<button class="tab${S.tab===id?' on':''}" onclick="S.tab='${id}';S.ei=null;S.ee=null;S.em=null;S.inv=null;render()"><span>${i}</span>${l}</button>`).join('')}</div>`;}

// Stat card & mini bar
function sC(l,v,s,c,i){return `<div class="sc"><div style="display:flex;justify-content:space-between;align-items:flex-start"><div><div class="scl">${l}</div><div class="scv" style="color:${c}">${v}</div><div class="scs">${s}</div></div><span class="sci">${i}</span></div></div>`;}
function mB(l,d,mx,c){const p=mx>0?(d/mx)*100:0;return `<div class="mb"><div class="mbh"><span class="mbl">${l}</span><span class="mbv">${fc(d)}</span></div><div class="mbt"><div class="mbf" style="width:${Math.min(p,100)}%;background:${c}"></div></div></div>`;}

// ─── DASHBOARD ───────────────────────────────────────────
function rDash(inc,exp,mil){
  const ti=inc.reduce((s,r)=>s+r.FeeAmount,0),pi=inc.filter(r=>r.Status==='Paid').reduce((s,r)=>s+r.FeeAmount,0);
  const pend=inc.filter(r=>r.Status!=='Paid').reduce((s,r)=>s+r.FeeAmount,0);
  const te=exp.reduce((s,r)=>s+(Number(r.Amount)||0),0),ma=mil.reduce((s,r)=>s+r.Amount,0),totE=te+ma,net=pi-totE;
  const de=exp.reduce((s,r)=>s+dedA(r),0)+ma;
  const ov=inc.filter(r=>r.Status==='Invoiced'&&r.DueDate&&new Date(r.DueDate)<new Date()).length;
  const cpl={};inc.forEach(r=>{const c=r.Client||'Other';if(!cpl[c])cpl[c]={r:0,n:0};cpl[c].r+=r.FeeAmount;cpl[c].n++;});
  const ebc={};exp.forEach(r=>{const c=r.Category||'Other';ebc[c]=(ebc[c]||0)+(Number(r.Amount)||0);});
  return `<div class="sg">${sC('Revenue',fc(ti),inc.length+' placements','var(--ac)','↗')}${sC('Collected',fc(pi),inc.filter(r=>r.Status==='Paid').length+' paid','var(--gn)','✓')}${sC('Outstanding',fc(pend),ov>0?ov+' overdue!':'pending','var(--gl)','◷')}${sC('Expenses',fc(totE),exp.length+'+'+mil.length+' mi','var(--rd)','↙')}${sC('Net Income',fc(net),'collected-expenses',net>=0?'var(--gn)':'var(--rd)','◎')}${sC('Deductible',fc(de),'tax deductible','var(--bu)','⬡')}</div>
    <div class="tc"><div class="pn"><div class="pt">Revenue by Client</div>${Object.entries(cpl).sort((a,b)=>b[1].r-a[1].r).map(([n,d])=>mB(n+' ('+d.n+')',d.r,ti,'var(--ac)')).join('')}${Object.keys(cpl).length===0?'<div class="empty" style="padding:10px">No income</div>':''}</div>
    <div class="pn"><div class="pt">Expenses by Category</div>${Object.entries(ebc).sort((a,b)=>b[1]-a[1]).map(([c,a])=>mB(c,a,totE,'var(--gl)')).join('')}${ma>0?mB('Mileage',ma,totE,'var(--gl)'):''}${Object.keys(ebc).length===0&&mil.length===0?'<div class="empty" style="padding:10px">No expenses</div>':''}</div></div>`;}

// ─── INCOME ──────────────────────────────────────────────
function rInc(inc,p){
  return `<div class="sh"><h2 class="st">Placement Income</h2><div class="br">
    <button class="btn bs" onclick="xCSV(gi(),['Date','Client','Candidate','PositionTitle','Salary','FeePercent','FeeAmount','Status','PaymentTerms','InvoiceDate','DueDate','StartDate','ClientContact'],'10roof-income.csv')">↓ Export</button>
    <button class="btn bp" onclick="S.ei={ID:'',Date:'${now()}',Client:'',Candidate:'',PositionTitle:'',Salary:'',FeePercent:'10',FeeAmount:'',Description:'',Status:'Pending',PaymentTerms:'Net 30',InvoiceDate:'',DueDate:'',StartDate:'',ClientContact:''};render()">+ New Placement</button></div></div>
  ${S.ei?rIF():''}
  <div class="tw"><table><thead><tr><th>Date</th><th>Client</th><th>Candidate</th><th>Position</th><th>Salary</th><th>Fee</th><th>Status</th><th>Due</th><th></th></tr></thead><tbody>
  ${inc.map(r=>{const od=r.Status==='Invoiced'&&r.DueDate&&new Date(r.DueDate)<new Date();
    return `<tr${od?' style="background:var(--rdm)"':''}>
    <td>${fd(r.Date)}</td><td style="font-weight:500">${r.Client}</td><td>${r.Candidate}</td><td style="font-size:12px;color:var(--tm)">${r.PositionTitle}</td>
    <td class="m">${fc(r.Salary)}</td><td class="m at">${fc(r.FeeAmount)}</td>
    <td><span class="${od?'badge b-overdue':bc(r.Status)}">${od?'Overdue':r.Status}</span></td>
    <td style="font-size:12px">${r.DueDate?fd(r.DueDate):''}</td>
    <td><button class="btn bg" onclick="editI('${r.ID}')">Edit</button><button class="btn bg" onclick="S.inv=S.inc.find(x=>x.ID==='${r.ID}');render()" title="Invoice">🧾</button><button class="btn bg r" onclick="delRec('Income','${r.ID}',S.inc)">×</button></td></tr>`;}).join('')}
  </tbody></table>${inc.length===0?`<div class="empty">No income for ${p}.</div>`:''}</div>`;}

function editI(id){const r=S.inc.find(x=>x.ID===id);if(r)S.ei={...r,Salary:String(r.Salary),FeePercent:String(r.FeePercent),FeeAmount:String(r.FeeAmount)};render();}

function rIF(){
  const d=S.ei,ed=S.inc.some(r=>r.ID===d.ID);
  const o=(a,v)=>a.map(x=>`<option value="${x}"${x===v?' selected':''}>${x}</option>`).join('');
  return `<div class="fp"><div class="fpt">${ed?'Edit':'New'} Placement</div><div class="fg">
    <div class="fl"><label class="fll">Date</label><input type="date" class="fi" value="${d.Date}" onchange="S.ei.Date=this.value"/></div>
    <div class="fl"><label class="fll">Client</label><select class="fs" onchange="S.ei.Client=this.value"><option value="">Select...</option>${o(CLI,d.Client)}</select></div>
    <div class="fl"><label class="fll">Client Contact</label><input class="fi" value="${d.ClientContact||''}" onchange="S.ei.ClientContact=this.value" placeholder="Billing contact name"/></div>
    <div class="fl"><label class="fll">Candidate</label><input class="fi" value="${d.Candidate}" onchange="S.ei.Candidate=this.value"/></div>
    <div class="fl"><label class="fll">Position Title</label><input class="fi" value="${d.PositionTitle||''}" onchange="S.ei.PositionTitle=this.value" placeholder="e.g. Finance Analyst"/></div>
    <div class="fl"><label class="fll">Start Date</label><input type="date" class="fi" value="${d.StartDate||''}" onchange="S.ei.StartDate=this.value"/></div>
    <div class="fl"><label class="fll">Base Salary</label><input type="number" class="fi" value="${d.Salary}" onchange="S.ei.Salary=this.value;cF()"/></div>
    <div class="fl"><label class="fll">Fee %</label><input type="number" class="fi" value="${d.FeePercent}" step="0.5" onchange="S.ei.FeePercent=this.value;cF()"/></div>
    <div class="fl"><label class="fll">Fee Amount</label><input type="number" class="fi" id="ff" value="${d.FeeAmount}" onchange="S.ei.FeeAmount=this.value"/></div>
    <div class="fl"><label class="fll">Status</label><select class="fs" onchange="S.ei.Status=this.value"><option value="">Select...</option>${o(STS,d.Status)}</select></div>
    <div class="fl"><label class="fll">Payment Terms</label><input class="fi" value="${d.PaymentTerms||''}" placeholder="Net 30" onchange="S.ei.PaymentTerms=this.value"/></div>
    <div class="fl"><label class="fll">Invoice Date</label><input type="date" class="fi" value="${d.InvoiceDate||''}" onchange="S.ei.InvoiceDate=this.value;cD()"/></div>
    <div class="fl"><label class="fll">Due Date</label><input type="date" class="fi" id="fd" value="${d.DueDate||''}" onchange="S.ei.DueDate=this.value"/></div>
    <div class="fl" style="grid-column:span 2"><label class="fll">Notes</label><input class="fi" value="${d.Description||''}" onchange="S.ei.Description=this.value"/></div>
  </div><div class="br" style="margin-top:16px"><button class="btn bp" onclick="saveI()">Save</button><button class="btn bg" onclick="S.ei=null;render()">Cancel</button></div></div>`;}

function cF(){const s=Number(S.ei.Salary)||0,p=Number(S.ei.FeePercent)||10;S.ei.FeeAmount=(s*p/100).toFixed(2);const el=document.getElementById('ff');if(el)el.value=S.ei.FeeAmount;}
function cD(){const inv=S.ei.InvoiceDate,terms=S.ei.PaymentTerms||'',m=terms.match(/(\d+)/);if(inv&&m){const d=new Date(inv+'T00:00:00');d.setDate(d.getDate()+Number(m[1]));S.ei.DueDate=d.toISOString().split('T')[0];const el=document.getElementById('fd');if(el)el.value=S.ei.DueDate;}}

// ─── EXPENSES ────────────────────────────────────────────
function rExp(exp,p){
  return `<div class="sh"><h2 class="st">Business Expenses</h2><div class="br">
    <button class="btn bs" onclick="xCSV(ge(),['Date','Category','Vendor','Amount','Description','TaxDeductible'],'10roof-expenses.csv')">↓ Export</button>
    <button class="btn bp" onclick="S.ee={ID:'',Date:'${now()}',Category:'',Vendor:'',Amount:'',Description:'',TaxDeductible:'TRUE'};render()">+ New Expense</button></div></div>
  ${S.ee?rEF():''}
  <div class="tw"><table><thead><tr><th>Date</th><th>Category</th><th>Vendor</th><th>Amount</th><th>Deductible</th><th></th></tr></thead><tbody>
  ${exp.map(r=>{const h=HALF.includes(r.Category);return `<tr><td>${fd(r.Date)}</td><td style="font-weight:500">${r.Category}${h?' <span style="color:var(--gl);font-size:10px">50%</span>':''}</td><td>${r.Vendor}</td><td class="m rt">${fc(r.Amount)}</td><td>${isDed(r.TaxDeductible)?(h?'50%':'✓'):'—'}</td>
    <td><button class="btn bg" onclick="S.ee={...S.exp.find(x=>x.ID==='${r.ID}'),Amount:String(S.exp.find(x=>x.ID==='${r.ID}').Amount)};render()">Edit</button><button class="btn bg r" onclick="delRec('Expenses','${r.ID}',S.exp)">×</button></td></tr>`;}).join('')}
  </tbody></table>${exp.length===0?`<div class="empty">No expenses for ${p}.</div>`:''}</div>`;}

function rEF(){
  const d=S.ee,ed=S.exp.some(r=>r.ID===d.ID),dd=isDed(d.TaxDeductible),h=HALF.includes(d.Category);
  const o=(a,v)=>a.map(x=>`<option value="${x}"${x===v?' selected':''}>${x}</option>`).join('');

    <div class="fl" style="display:flex;align-items:flex-end;padding-bottom:2px">
      <div style="display:flex;align-items:center;gap:8px;cursor:pointer;font-size:13px;color:var(--tm)" onclick="S.ee.TaxDeductible=isDed(S.ee.TaxDeductible)?'FALSE':'TRUE';render()">
        <div style="width:18px;height:18px;border-radius:4px;border:1px solid ${dd?'var(--ac)':'var(--bd)'};background:${dd?'var(--ag)':'transparent'};display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;color:var(--ac)">${dd?'✓':''}</div>Deductible</div></div>
  </div><div class="br" style="margin-top:16px"><button class="btn bp" onclick="saveE()">Save</button><button class="btn bg" onclick="S.ee=null;render()">Cancel</button></div></div>`;}

// ─── MILEAGE ─────────────────────────────────────────────
function rMil(mil,p){
  const tm=mil.reduce((s,r)=>s+r.Miles,0),ta=mil.reduce((s,r)=>s+r.Amount,0);
  return `<div class="sh"><h2 class="st">Mileage Tracker</h2><div class="br">

    <button class="btn bp" onclick="S.em={ID:'',Date:'${now()}',Description:'',Miles:'',Rate:'${MPM}',Amount:''};render()">+ New Trip</button></div></div>
  <div class="sg">${sC('Total Miles',tm.toLocaleString(),mil.length+' trips','var(--ac)','⊙')}${sC('Deduction',fc(ta),'$'+MPM+'/mi','var(--gn)','↙')}</div>
  ${S.em?rMF():''}
  <div class="tw"><table><thead><tr><th>Date</th><th>Description</th><th>Miles</th><th>Deduction</th><th></th></tr></thead><tbody>
  ${mil.map(r=>`<tr><td>${fd(r.Date)}</td><td>${r.Description}</td><td class="m">${r.Miles.toLocaleString()}</td><td class="m at">${fc(r.Amount)}</td>
    <td><button class="btn bg" onclick="S.em={...S.mil.find(x=>x.ID==='${r.ID}'),Miles:String(S.mil.find(x=>x.ID==='${r.ID}').Miles)};render()">Edit</button><button class="btn bg r" onclick="delRec('Mileage','${r.ID}',S.mil)">×</button></td></tr>`).join('')}
  </tbody></table>${mil.length===0?`<div class="empty">No mileage for ${p}.</div>`:''}</div>`;}

function rMF(){
  const d=S.em,ed=S.mil.some(r=>r.ID===d.ID),mi=Number(d.Miles)||0;
  return `<div class="fp"><div class="fpt">${ed?'Edit':'New'} Mileage</div><div class="fg">

// ─── CLIENT P&L ──────────────────────────────────────────
function rCli(inc,p){
  const cp={};inc.forEach(r=>{const c=r.Client||'Other';if(!cp[c])cp[c]={r:0,n:0,rows:[]};cp[c].r+=r.FeeAmount;cp[c].n++;cp[c].rows.push(r);});
  return `<h2 class="st" style="margin-bottom:20px">Client P&L — ${p}</h2>
    ${Object.entries(cp).sort((a,b)=>b[1].r-a[1].r).map(([n,d])=>{
      const avg=d.rows.reduce((s,r)=>s+r.Salary,0)/d.rows.length;
      return `<div class="pn" style="margin-bottom:16px"><div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:14px;flex-wrap:wrap;gap:10px"><div>
        <div style="font-size:16px;font-weight:600;margin-bottom:4px">${n}</div>
        <div style="font-size:12px;color:var(--tm)">${d.n} placement${d.n!==1?'s':''} · Avg: ${fc(avg)}</div></div>
        <div style="font-size:24px;font-weight:700;font-family:'Space Mono',monospace;color:var(--ac)">${fc(d.r)}</div></div>
        <div class="tw"><table><thead><tr><th>Date</th><th>Candidate</th><th>Position</th><th>Salary</th><th>Fee</th><th>Status</th></tr></thead><tbody>
        ${d.rows.map(r=>`<tr><td>${fd(r.Date)}</td><td>${r.Candidate}</td><td style="font-size:12px;color:var(--tm)">${r.PositionTitle}</td><td class="m">${fc(r.Salary)}</td><td class="m at">${fc(r.FeeAmount)}</td><td><span class="${bc(r.Status)}">${r.Status}</span></td></tr>`).join('')}
        </tbody></table></div></div>`;}).join('')}
    ${Object.keys(cp).length===0?`<div class="empty">No data for ${p}.</div>`:''}`;
}

// ─── AGING ───────────────────────────────────────────────
function rAge(inc){
  const td=now(),rows=inc.filter(r=>r.Status==='Invoiced'||r.Status==='Overdue').map(r=>{
    const inv=r.InvoiceDate||r.Date,age=Math.floor((new Date(td)-new Date(inv))/864e5);
    const od=r.DueDate&&new Date(r.DueDate)<new Date(),dod=r.DueDate?Math.floor((new Date(td)-new Date(r.DueDate))/864e5):0;
    return{...r,age,od,dod};}).sort((a,b)=>b.age-a.age);
  const tot=rows.reduce((s,r)=>s+r.FeeAmount,0),odA=rows.filter(r=>r.od).reduce((s,r)=>s+r.FeeAmount,0);
  return `<h2 class="st" style="margin-bottom:20px">Aging Report</h2>
    <div class="sg">${sC('Outstanding',fc(tot),rows.length+' invoices','var(--gl)','◷')}${sC('Overdue',fc(odA),rows.filter(r=>r.od).length+' past due','var(--rd)','⚠')}</div>
    <div class="tw"><table><thead><tr><th>Client</th><th>Candidate</th><th>Fee</th><th>Invoiced</th><th>Due</th><th>Age</th><th>Status</th></tr></thead><tbody>
    ${rows.map(r=>`<tr${r.od?' style="background:var(--rdm)"':''}>
      <td style="font-weight:500">${r.Client}</td><td>${r.Candidate}</td><td class="m at">${fc(r.FeeAmount)}</td>
      <td>${fd(r.InvoiceDate||r.Date)}</td><td>${r.DueDate?fd(r.DueDate):'—'}</td>
      <td class="m" style="color:${r.od?'var(--rd)':'var(--tx)'}">${r.age}d${r.od?' (+'+r.dod+'d)':''}</td>
      <td><span class="${r.od?'badge b-overdue':'badge b-invoiced'}">${r.od?'Overdue':'Invoiced'}</span></td></tr>`).join('')}
    </tbody></table>${rows.length===0?'<div class="empty">All caught up!</div>':''}</div>`;}

// ─── INVOICE ─────────────────────────────────────────────
function rInv(r){
  const num='10R-'+String(r.Date||'').replace(/-/g,'')+'-'+String(r.ID).slice(-4).toUpperCase();
  const subj=encodeURIComponent(`10Roof Invoice ${num} — ${r.Candidate}, ${r.PositionTitle||'Placement'}`);
  const body=encodeURIComponent(`Hi${r.ClientContact?` ${r.ClientContact}`:''},\n\nPlease find the attached invoice for the placement of ${r.Candidate} as ${r.PositionTitle||'[Position]'} at ${r.Client}.\n\nInvoice #: ${num}\nAmount Due: ${fc(r.FeeAmount)}\nTerms: ${r.PaymentTerms||'As agreed'}${r.DueDate?'\nDue Date: '+fd(r.DueDate):''}\n\nRemittance Address:\n10Roof LLC\n6 S Lewis St\nCastle Rock, CO 80104\n\nThank you for your business.\n\nJeremy Crum\n10Roof LLC\njcrum@10-roof.com`);
  const gmail=`https://mail.google.com/mail/?view=cm&fs=1&su=${subj}&body=${body}`;

  return `${S.nf?`<div class="nf ${S.nf.t}">${S.nf.m}</div>`:''}
    <div style="padding:20px;max-width:850px;margin:0 auto">
      <div class="br" style="margin-bottom:20px">
        <button class="btn bp" onclick="window.print()">🖨 Print / Save PDF</button>
        <a href="${gmail}" target="_blank" class="btn bs" style="text-decoration:none">📧 Open in Gmail</a>
        <button class="btn bs" onclick="S.inv=null;render()">← Back</button>
      </div>
      <div class="inv">
        <div class="inv-h">
          <div><img src="${LOGO}" style="width:70px;height:70px;border-radius:4px"/></div>
          <div class="inv-co"><strong>10Roof LLC</strong>6 S Lewis St<br>Castle Rock, CO 80104<br>jcrum@10-roof.com<br>10-roof.com</div>
        </div>
        <div style="display:flex;justify-content:space-between;margin-bottom:24px">
          <div style="font-size:24px;font-weight:700">INVOICE</div>
          <div style="text-align:right;font-size:13px;color:#555">
            Invoice #: <strong>${num}</strong><br>Date: <strong>${fd(r.InvoiceDate||r.Date)}</strong><br>
            ${r.DueDate?'Due: <strong>'+fd(r.DueDate)+'</strong><br>':''}
            Terms: <strong>${r.PaymentTerms||'As agreed'}</strong>
          </div>
        </div>
        <div class="inv-m">
          <div class="inv-mb"><strong>Bill To</strong>${r.Client}${r.ClientContact?'<br>Attn: '+r.ClientContact:''}</div>
          <div class="inv-mb"><strong>Placement Details</strong>Candidate: ${r.Candidate}${r.PositionTitle?'<br>Position: '+r.PositionTitle:''}${r.StartDate?'<br>Start Date: '+fd(r.StartDate):''}</div>
        </div>
        <table class="inv-t"><thead><tr><th>Description</th><th style="text-align:right">Base Salary</th><th style="text-align:right">Fee %</th><th style="text-align:right">Amount</th></tr></thead>
          <tbody><tr><td>Placement Fee — ${r.Candidate}${r.PositionTitle?', '+r.PositionTitle:''}${r.Description?' ('+r.Description+')':''}</td>
            <td style="text-align:right">${fc(r.Salary)}</td><td style="text-align:right">${r.FeePercent}%</td>
            <td style="text-align:right;font-weight:700">${fc(r.FeeAmount)}</td></tr></tbody></table>
        <div class="inv-tot">Total Due: ${fc(r.FeeAmount)}</div>
        <div class="inv-pay"><strong>Remittance Address</strong><br>10Roof LLC<br>6 S Lewis St<br>Castle Rock, CO 80104</div>
        <div class="inv-ft">Thank you for your business. Please reference invoice #${num} with your payment.</div>
      </div></div>`;}

// ─── TAX PREP ────────────────────────────────────────────
function rTax(inc,exp,mil){
  const p=inc.filter(r=>r.Status==='Paid').reduce((s,r)=>s+r.FeeAmount,0);
  const de=exp.reduce((s,r)=>s+dedA(r),0),ma=mil.reduce((s,r)=>s+r.Amount,0),td=de+ma,tx=p-td;
  const ef=Math.max(0,tx*FED),es=Math.max(0,tx*CO),ese=Math.max(0,tx*SE),et=ef+es+ese;
  const tp=gtp(),paid=tp.reduce((s,r)=>s+r.Amount,0),rem=Math.max(0,et-paid);
  const ht=exp.filter(r=>HALF.includes(r.Category)).reduce((s,r)=>s+(Number(r.Amount)||0),0);

  return `<h2 class="st" style="margin-bottom:20px">Tax Prep & P&L — ${S.yr}</h2>
    <div class="sg">${sC('Gross (Paid)',fc(p),inc.filter(r=>r.Status==='Paid').length+' placements','var(--ac)','↗')}${sC('Deductions',fc(td),'exp+mileage','var(--gl)','↙')}${sC('Taxable',fc(tx),'','var(--tx)','◎')}</div>
    <div class="pn" style="margin-bottom:20px"><div class="pt">P&L Summary</div>
      <table style="width:100%"><tbody>
        <tr><td style="font-weight:600;padding:6px 0">Gross Income (Paid)</td><td class="m" style="text-align:right;padding:6px 0;color:var(--ac)">${fc(p)}</td></tr>
        <tr><td colspan="2" style="padding:10px 0 4px;font-size:11px;color:var(--tm);text-transform:uppercase">Deductions</td></tr>
        ${Object.entries(exp.reduce((a,r)=>{if(isDed(r.TaxDeductible)){const c=r.Category||'Other';a[c]=(a[c]||0)+dedA(r);}return a;},{})).sort((a,b)=>b[1]-a[1]).map(([c,a])=>`<tr><td style="padding:4px 0 4px 16px;color:var(--tm)">${c}</td><td class="m" style="text-align:right;padding:4px 0;color:var(--rd)">(${fc(a)})</td></tr>`).join('')}
        ${ma>0?`<tr><td style="padding:4px 0 4px 16px;color:var(--tm)">Mileage (${mil.reduce((s,r)=>s+r.Miles,0)} mi)</td><td class="m" style="text-align:right;padding:4px 0;color:var(--rd)">(${fc(ma)})</td></tr>`:''}
        <tr style="border-top:1px solid var(--bd)"><td style="font-weight:600;padding:8px 0">Total Deductions</td><td class="m" style="text-align:right;padding:8px 0;color:var(--rd)">(${fc(td)})</td></tr>
        <tr style="border-top:2px solid var(--ac)"><td style="font-weight:700;padding:10px 0;font-size:15px">Net Taxable</td><td class="m" style="text-align:right;padding:10px 0;font-size:15px;font-weight:700;color:${tx>=0?'var(--gn)':'var(--rd)'}">${fc(tx)}</td></tr>
      </tbody></table>
      ${ht>0?`<div style="margin-top:12px;font-size:11px;color:var(--gl)">* Meals: ${fc(ht)} total, ${fc(ht*.5)} deductible (50% IRS)</div>`:''}
    </div>
    <div class="tc" style="margin-bottom:28px">
      <div class="pn"><div class="pt">Tax Breakdown</div>
        ${mB('Federal (22%)',ef,et,'var(--bu)')}${mB('Colorado (4.4%)',es,et,'var(--ac)')}${mB('SE (15.3%)',ese,et,'var(--gl)')}
        <div style="margin-top:16px;padding-top:14px;border-top:1px solid var(--bd);display:flex;justify-content:space-between"><span style="font-size:13px;font-weight:600">Total</span><span class="m" style="font-size:16px;font-weight:700;color:var(--rd)">${fc(et)}</span></div>
        <div style="display:flex;justify-content:space-between;margin-top:8px"><span style="font-size:12px;color:var(--tm)">Quarterly</span><span class="m" style="font-size:13px;color:var(--tm)">${fc(et/4)}</span></div></div>
      <div class="pn"><div class="pt">Payments</div>
        ${tp.map(r=>`<div style="display:flex;justify-content:space-between;padding:8px 0;border-bottom:1px solid var(--bd);font-size:13px;align-items:center"><span>${fd(r.Date)} — ${r.Type}</span><div style="display:flex;gap:10px;align-items:center"><span class="m" style="color:var(--gn)">${fc(r.Amount)}</span><button class="btn bg r" onclick="delRec('Tax Payments','${r.ID}',S.tp)">×</button></div></div>`).join('')}
        ${tp.length===0?'<div style="color:var(--td);font-size:13px;margin-bottom:12px">None</div>':''}
        <div style="margin-top:16px;padding-top:14px;border-top:1px solid var(--bd);display:flex;flex-direction:column;gap:8px">
          <div style="display:flex;justify-content:space-between"><span style="font-size:13px;font-weight:600">Paid</span><span class="m" style="color:var(--gn)">${fc(paid)}</span></div>
          <div style="display:flex;justify-content:space-between"><span style="font-size:13px;font-weight:600;color:var(--rd)">Remaining</span><span class="m" style="color:var(--rd)">${fc(rem)}</span></div></div>
        <div style="margin-top:16px"><button class="btn bs" onclick="addTP()">+ Record Payment</button></div></div></div>
    <div class="disc"><strong>⚠</strong> Rough estimates. Meals at 50% per IRS. Consult a CPA. CO quarterly: Apr 15, Jun 15, Sep 15, Jan 15.</div>`;
}

// ─── INIT ────────────────────────────────────────────────
const sv=localStorage.getItem('10r_u');
if(sv){CFG.URL=sv;S.cfg=true;}
if(sessionStorage.getItem('10r_a')==='1'){S.auth=true;if(S.cfg){render();loadAll();}else render();}
else render();
</script>
</body>
